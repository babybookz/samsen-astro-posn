<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยินดีต้อนรับ | Samsen Astro POSN</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #F4F6F9; /* สีพื้นหลังสว่าง */
            --text-dark: #181C32;
            --text-muted: #7E8299;
            --btn-green: #00A65A; /* สีเขียวปุ่มเข้าสู่ระบบ */
            --btn-green-hover: #008D4C;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--main-bg);
            padding: 20px;
            box-sizing: border-box;
        }

        /* กล่องตรงกลางจอ */
        .content-wrapper {
            text-align: center;
            max-width: 600px;
            width: 100%;
            background: transparent;
        }

        .logo-placeholder {
            width: 130px;
            height: 130px;
            background: #ffffff;
            border-radius: 25px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 4.5rem;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            /* หากมีโลโก้โรงเรียน สามารถเปลี่ยน <div> นี้เป็นแท็ก <img> ได้เลยครับ */
        }

        h1 {
            color: var(--text-dark);
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 1.15rem;
            line-height: 1.6;
            margin: 0 0 40px 0;
        }

        .btn-enter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--btn-green);
            color: white;
            padding: 15px 35px;
            border-radius: 50px; /* ขอบมนแบบแคปซูล */
            font-size: 1.15rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 166, 90, 0.2);
        }

        .btn-enter:hover {
            background: var(--btn-green-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 166, 90, 0.3);
        }
    </style>
</head>
<body>
    
    <div class="content-wrapper">
        <div class="logo-placeholder">🪐</div>
        
        <h1>Samsen Astro POSN</h1>
        <p>ระบบจัดการศูนย์สอบโอลิมปิกวิชาการ สอวน.<br>วิชาดาราศาสตร์ โรงเรียนสามเสนวิทยาลัย</p>
        
        <a href="home.html" class="btn-enter">เข้าสู่เว็บไซต์ &rarr;</a>
    </div>

</body>
</html>

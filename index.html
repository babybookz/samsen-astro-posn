<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยินดีต้อนรับ | Samsen Astro POSN</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* --- เปลี่ยนสีพื้นหลังให้ดู Premium ขึ้นเล็กน้อย --- */
            --main-bg: #FAFAFA; /* Off-white */
            --text-dark: #181C32;
            --text-muted: #7E8299;

            /* --- NEW THEME: PURPLE & ORANGE (ELEGANT) --- */
            --theme-purple: #4A148C; /* ม่วงเข้ม สวยสง่า (Primary) */
            --theme-orange: #FF8F00; /* ส้มทอง หรูหรา (Accent/Hover) */
            --theme-purple-light: rgba(74, 20, 140, 0.1);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--main-bg);
            padding: 20px;
            box-sizing: border-box;
            /* เพิ่ม Gradient พื้นหลังบางๆ เพื่อความสวยงาม */
            background-image: radial-gradient(var(--theme-purple-light) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .content-wrapper {
            text-align: center;
            max-width: 600px;
            width: 100%;
            background: transparent;
        }

        /* --- สไตล์สำหรับโลโก้คู่ --- */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px; /* ระยะห่างระหว่าง 2 โลโก้ */
            margin-bottom: 35px;
        }

        .logo-img {
            max-height: 110px; /* กำหนดความสูงสูงสุดเพื่อให้ดูสง่า */
            width: auto; /* รักษาอัตราส่วนรูปภาพ */
            /* เพิ่มเงาอ่อนๆ ให้รูปภาพดูมีมิติ */
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.08));
            transition: transform 0.3s ease;
        }

        /* ลูกเล่นเวลาเอาเมาส์วางที่รูปโลโก้ */
        .logo-img:hover {
            transform: scale(1.05);
        }

        /* เจาะจงขนาดแยกกันหากจำเป็น (ตัวอย่าง) */
        .logo-samsen {
            max-height: 110px;
        }
        .logo-astro {
            max-height: 115px;
        }

        h1 {
            color: var(--text-dark);
            font-size: 2.5rem; /* ขยายขนาดหัวข้อเล็กน้อย */
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        /* เพิ่มเส้นใต้หัวข้อเล็กน้อย */
        h1::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--theme-orange); /* สีส้มทอง */
            margin: 10px auto 0;
            border-radius: 2px;
        }

        p {
            color: var(--text-muted);
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 25px 0 50px 0;
        }

        /* --- สไตล์ปุ่มในธีมใหม่ --- */
        .btn-enter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--theme-purple); /* สีม่วงเข้ม */
            color: white;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            /* เงาปุ่มเป็นสีม่วงอ่อนๆ */
            box-shadow: 0 5px 20px rgba(74, 20, 140, 0.25);
        }

        .btn-enter:hover {
            background: var(--theme-orange); /* เปลี่ยนเป็นสีส้มทองเวลา hover */
            transform: translateY(-3px);
            /* เงาเวลา hover เป็นสีส้มทอง */
            box-shadow: 0 10px 30px rgba(255, 143, 0, 0.4);
            color: #fff;
        }

        /* เพิ่มลูกเล่นลูกศรเล็กน้อย */
        .btn-enter .arrow {
            transition: transform 0.3s ease;
        }
        .btn-enter:hover .arrow {
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    
    <div class="content-wrapper">
        <div class="logo-container">
            <img src="assets/samsen-emblem.png" alt="Samsen Logo" class="logo-img">
            <img src="assets/posn-emblem.png" alt="Astro Logo" class="logo-img">
        </div>
        <h1>Samsen Astro POSN</h1>
        <p>ระบบจัดการศูนย์สอบโอลิมปิกวิชาการ สอวน.<br>วิชาดาราศาสตร์ โรงเรียนสามเสนวิทยาลัย</p>
        
        <a href="home.html" class="btn-enter">
            เข้าสู่เว็บไซต์ <span class="arrow">&rarr;</span>
        </a>
    </div>

</body>
</html>

                          showToast('ลบแม่แบบเรียบร้อยแล้ว');
                      } catch (err) {
                          showToast('ลบในฐานข้อมูลไม่สำเร็จ', 'error');
                      }
                  }).withFailureHandler((err) => {
                      showToast('ลบใน Drive ไม่สำเร็จ: ' + err.message, 'error');
                  }).deleteFileFromDrive(template.fileUrl);
              }, true);
          };

          const handleRenameSubmit = async (e) => {
              e.preventDefault();
              
              // [เพิ่ม] ป้องกันการแก้ไขชื่อไฟล์หลังปิดระบบ
              if (isSubmissionLocked(activeTab)) {
                  showToast("ไม่สามารถแก้ไขข้อมูลได้ เนื่องจากระบบปิดแล้ว", "error");
                  return;
              }

              if (!renameData.title.trim()) return;
              
              const ext = renameData.fileName.includes('.') ? renameData.fileName.split('.').pop() : '';
              const newFullFileName = ext ? `${renameData.title}.${ext}` : renameData.title;
              const collection = renameData.collection || 'evidences';
              
              // ---------------------------------------------------------
              // [เพิ่มส่วนนี้] : สั่งอัปเดตหน้าจอทันที (ไม่ต้องรอ Database)
              // ---------------------------------------------------------
              const updateLocalState = (prevList) => prevList.map(item => 
                  item.id === renameData.id 
                  ? { ...item, title: renameData.title, fileName: newFullFileName } 
                  : item
              );

              if (collection === 'evidences') setEvidences(prev => updateLocalState(prev));
              else if (collection === 'other_documents') setOtherDocs(prev => updateLocalState(prev));
              else if (collection === 'templates') setCurrentTemplates(prev => updateLocalState(prev));
              else if (collection === 'item_descriptions') setDescFiles(prev => updateLocalState(prev));
              else if (collection === 'summary_templates') setSummaryTemplates(prev => updateLocalState(prev));
              else if (collection === 'summary_submissions') setSummarySubmissions(prev => updateLocalState(prev));
              else if (collection === 'operation_result_templates') setOpResultTemplates(prev => updateLocalState(prev));
              else if (collection === 'operation_result_submissions') setOpResultSubmissions(prev => updateLocalState(prev));
              // ---------------------------------------------------------

              try { 
                  // ปิด Modal ทันที เพื่อความลื่นไหล
                  setShowRenameModal(false); 

                  await db.collection(collection).doc(renameData.id).update({ title: renameData.title, fileName: newFullFileName }); 
                  google.script.run.withFailureHandler(e => console.error(e)).renameFileInDrive(renameData.url, newFullFileName); 
                  
                  // บันทึก Log
                  logSystemActivity(db, user, 'Rename File', `เปลี่ยนชื่อไฟล์จาก "${renameData.fileName}" เป็น "${newFullFileName}"`);
                  
                  showToast("เปลี่ยนชื่อไฟล์สำเร็จ"); 
              } catch (err) { 
                  // ถ้า Error ค่อยแจ้งเตือน (ข้อมูลหน้าจออาจจะผิดพลาดชั่วคราว แต่ User จะเห็นว่าเปลี่ยนแล้ว)
                  console.error(err);
                  showToast("เกิดข้อผิดพลาด: " + err.message, 'error'); 
              }
          };

          const handleDeleteSubmit = () => {
              // [เพิ่ม] ป้องกันการลบไฟล์หลังปิดระบบ
              if (isSubmissionLocked(activeTab)) {
                  showToast("ไม่สามารถลบข้อมูลได้ เนื่องจากระบบปิดแล้ว", "error");
                  return;
              }

              if (!deleteData) return;
              const collection = deleteData.collection || 'evidences';
              
              google.script.run.withSuccessHandler(async () => { 
                  try { 
                      // 1. ลบจาก Database
                      await db.collection(collection).doc(deleteData.id).delete(); 
                      
                      // ... ในฟังก์ชัน handleDeleteSubmit ...
                  
                      // [แก้ไขส่วนนี้] แปลงชื่อที่เก็บ (Collection) เป็นภาษาไทยให้ครบถ้วน
                      let locationText = collection; 

                      if (collection === 'other_documents') {
                          const catId = deleteData.category;
                          const catObj = OTHER_DOC_CATS.find(c => c.id === catId);
                          locationText = catObj ? `เอกสารอื่นๆ หมวด ${catObj.label}` : 'เอกสารอื่นๆ';
                      } else if (collection === 'evidences') {
                          locationText = 'เอกสารหลักฐาน';
                      } else if (collection === 'templates') {
                          locationText = 'ไฟล์แม่แบบ (มาตรฐาน)';
                      } else if (collection === 'item_descriptions') {
                          locationText = 'คำอธิบายตัวบ่งชี้';
                      } else if (collection === 'summary_templates') {
                          locationText = 'แบบฟอร์ม (สรุปผล)';
                      } else if (collection === 'operation_result_templates') {
                          locationText = 'แบบฟอร์ม (ผลการดำเนินงาน)';
                      } else if (collection.includes('submission')) {
                          locationText = 'ไฟล์ส่งงาน';
                      }

                      // 2. บันทึก Log (เหมือนเดิม)
                      logSystemActivity(db, user, 'Delete File', `ลบไฟล์: ${deleteData.fileName} (จาก ${locationText})`);
           
                      setShowDeleteModal(false); 
                      showToast('ลบไฟล์เรียบร้อยแล้ว'); 
                  } catch (err) { 
                      showToast('ลบในฐานข้อมูลไม่สำเร็จ', 'error'); 
                  } 
              }).withFailureHandler((err) => { 
                  showToast('ลบใน Drive ไม่สำเร็จ: ' + err.message, 'error'); 
              }).deleteFileFromDrive(deleteData.fileUrl);
          };

          const openDeleteModal = useCallback((f) => { setDeleteData(f); setShowDeleteModal(true); }, []);
          const openRenameModal = useCallback((f) => { setRenameData({ id: f.id, title: f.title, url: f.fileUrl, fileName: f.fileName, collection: f.collection }); setShowRenameModal(true); }, []);
          const openPreviewModal = useCallback((f) => setPreviewFile(f), []);

          const handleSaveAnnouncement = async (e) => {
              e.preventDefault();
              if (!announceData.title.trim() || !announceData.content.trim()) return;
              try {
                  if (announceData.id) { 
                      await db.collection('announcements').doc(announceData.id).update({ title: announceData.title, content: announceData.content, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }); 
                      // ✅ Log: แก้ไขประกาศ
                      logSystemActivity(db, user, 'Announcement', `แก้ไขประกาศ: ${announceData.title}`);
                      showToast("แก้ไขประกาศสำเร็จ"); 
                  } else { 
                      await db.collection('announcements').add({ title: announceData.title, content: announceData.content, author: user.displayName || user.email, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); 
                      // ✅ Log: สร้างประกาศ
                      logSystemActivity(db, user, 'Announcement', `สร้างประกาศใหม่: ${announceData.title}`);
                      showToast("สร้างประกาศสำเร็จ"); 
                  }
                  setShowAnnounceModal(false); setAnnounceData({ id: null, title: '', content: '' });
              } catch (err) { console.error(err); showToast("บันทึกประกาศไม่สำเร็จ", 'error'); }
          };

          const handleDeleteAnnouncement = async (id) => { 
              openConfirm("ยืนยันการลบ?", "ประกาศนี้จะถูกลบถาวร", async () => { 
                  try { 
                      // 1. ดึงข้อมูลประกาศมาก่อน เพื่อเอาชื่อเรื่อง (Title)
                      const docRef = db.collection('announcements').doc(id);
                      const docSnap = await docRef.get();
                      const title = docSnap.exists ? docSnap.data().title : 'ไม่ทราบชื่อ'; // ถ้าไม่เจอให้ใส่ค่า default

                      // 2. ลบประกาศ
                      await docRef.delete(); 
                      
                      // 3. บันทึก Log โดยระบุชื่อเรื่องแทน ID
                      logSystemActivity(db, user, 'Announcement', `ลบประกาศ: ${title}`);
                      
                      showToast("ลบประกาศเรียบร้อยแล้ว"); 
                  } catch (err) { 
                      console.error(err);
                      showToast("ลบประกาศไม่สำเร็จ", 'error'); 
                  } 
              }, true); 
          };

          const handlePostComment = async (e) => {
              e.preventDefault();
              if (!commentText.trim() || !user) return;
              if (!activeItem || !currentYear) {
                  showToast("ไม่พบข้อมูลอ้างอิงสำหรับโพสต์ (กรุณาเลือกหัวข้อใหม่)", 'error');
                  return;
              }
              try { 
                  await db.collection('comments').add({ 
                      text: commentText, 
                      itemId: activeItem, 
                      year: currentYear, 
                      authorName: user.displayName || user.email, 
                      authorPhoto: user.photoURL || null, 
                      authorEmail: user.email, 
                      createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                  }); 
                  
                  // ✅ Log: คอมเมนต์
                  logSystemActivity(db, user, 'Comment', `แสดงความคิดเห็นในหัวข้อ: ${activeItem}`);

                  setCommentText(''); 
                  showToast("โพสต์ความคิดเห็นสำเร็จ"); 
              } catch (err) { 
                  console.error(err); 
                  showToast("ไม่สามารถโพสต์ได้: " + err.message, 'error'); 
              }
          };

          const handleDeleteComment = async (id) => { 
              openConfirm("ยืนยันการลบ?", "ความคิดเห็นนี้จะถูกลบถาวร", async () => { 
                  try { 
                      await db.collection('comments').doc(id).delete(); 
                      // ✅ Log: ลบคอมเมนต์
                      logSystemActivity(db, user, 'Comment', `ลบความคิดเห็น ID: ${id}`);
                      showToast("ลบความคิดเห็นเรียบร้อยแล้ว"); 
                  } catch (err) { showToast("ลบความคิดเห็นไม่สำเร็จ", 'error'); } 
              }, true); 
          };

          // Filtered Evidence Logic
          const filteredEvidences = useMemo(() => {
              let result = debouncedSearchTerm 
                  ? evidences.filter(e => e.title.toLowerCase().includes(debouncedSearchTerm.toLowerCase()) || (e.uploaderName && e.uploaderName.toLowerCase().includes(debouncedSearchTerm.toLowerCase())))
                  : evidences.filter(e => e.itemTitle === activeItem && e.standardId === activeTab);
              
              // บังคับให้เรียงลำดับไฟล์ใหม่สุดขึ้นก่อนเสมอ (เพื่อให้ใช้งานง่าย)
              result.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
              
              return result;
          }, [debouncedSearchTerm, evidences, activeItem, activeTab]); 

          const currentStd = STANDARDS_DATA.find(s => s.id === activeTab);
          // ค้นหา const renderBreadcrumbs = () => { ... แล้วแทนที่ด้วยชุดนี้
          const renderBreadcrumbs = () => {
              const theme = getStdTheme(currentStd?.id || 'default');
              
              // ตรวจสอบว่าเป็น Tab กลุ่มเอกสารพิเศษหรือไม่ (รวมเอกสารอื่นๆ และ ผลการพัฒนาฯ)
              const isSpecialDoc = activeTab === 'other_docs' || activeTab === 'devResult2567' || activeTab === 'devResult2566';
              
              // ตั้งชื่อที่จะแสดง
              let specialDocTitle = '';
              if (activeTab === 'other_docs') specialDocTitle = 'เอกสารอื่น ๆ';
              else if (activeTab === 'devResult2566') specialDocTitle = 'ผลการพัฒนาฯ 2566';
              else if (activeTab === 'devResult2567') specialDocTitle = 'ผลการพัฒนาฯ 2567';

              return (
                  <div className="flex flex-col min-w-0">
                      <div className="flex items-center flex-wrap text-xs text-slate-400 mb-1 gap-1">
                          <span className="cursor-pointer hover:text-primary-500 whitespace-nowrap" onClick={() => { setActiveTab(isStaff ? 'dashboard' : 'overview'); setActiveItem(null); }}>{isStaff ? 'Dashboard' : 'หน้าหลัก'}</span>
                          
                          {/* กรณีเป็นมาตรฐานปกติ */}
                          {currentStd && (
                              <>
                                  <Icon name="chevron-right" className="w-3 h-3 shrink-0"/> 
                                  <span className={`cursor-pointer truncate max-w-[120px] md:max-w-xs ${theme.main}`} onClick={() => { setActiveTab(currentStd.id); setActiveItem(null); }}>{currentStd.title}</span>
                              </>
                          )}

                          {/* กรณีเป็นเอกสารพิเศษ (แก้ส่วนนี้) */}
                          {isSpecialDoc && (
                              <>
                                  <Icon name="chevron-right" className="w-3 h-3 shrink-0"/> 
                                  <span className="font-bold text-slate-600">{specialDocTitle}</span>
                              </>
                          )}

                          {/* กรณีมีรายการย่อย (Active Item) */}
                          {activeItem && (
                              <>
                                  <Icon name="chevron-right" className="w-3 h-3 shrink-0"/> 
                                  <span className={`font-bold truncate max-w-[150px] md:max-w-xs ${theme.main}`}>{activeItem}</span>
                              </>
                          )}
                      </div>

                      {/* หัวข้อ H2 ด้านล่าง Breadcrumb */}
                      {!currentStd && (
                          <h2 className="text-xl font-bold text-dark truncate leading-tight tracking-tight">
                              {activeTab === 'dashboard' ? 'ภาพรวมระบบ' : 
                              activeTab === 'evaluate' ? 'ระบบการประเมินคะแนน' :
                              activeTab === 'messages' ? 'กล่องข้อความ' :
                              activeTab === 'maintenance' ? 'การบำรุงรักษาระบบ' :
                              isSpecialDoc ? specialDocTitle : 'ภาพรวม'}
                          </h2>
                      )}
                  </div>
              );
          };

          const activeTheme = getStdTheme(activeTab);

          const getCriteriaFileCount = (itemTitle, criteriaText) => {
              const submissions = opResultSubmissions.filter(s => s.itemTitle === itemTitle && s.criteriaText === criteriaText).length;
              return submissions;
          };

          const getSummaryFileCount = (itemTitle) => {
              const submissions = summarySubmissions.filter(s => s.itemTitle === itemTitle).length;
              return submissions;
          };

          const getEvidenceFileCount = (itemTitle) => {
              return evidences.filter(e => e.itemTitle === itemTitle).length;
          };

          const isLineBrowser = () => {
              const ua = navigator.userAgent || navigator.vendor || window.opera;
              return (ua.indexOf("Line") > -1) || (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1);
          };

          if (isLineBrowser()) {
              return (
                  <div className="fixed inset-0 z-[9999] bg-white flex flex-col items-center justify-center p-6 text-center">
                      <div className="w-20 h-20 bg-green-100 text-green-500 rounded-3xl flex items-center justify-center mb-6 shadow-sm">
                          <Icon name="globe" className="w-10 h-10"/>
                      </div>
                      <h2 className="text-2xl font-bold text-slate-800 mb-2 font-display">โปรดเปิดใน Safari หรือ Chrome</h2>
                      <p className="text-slate-500 mb-8 max-w-xs leading-relaxed">
                          ระบบ Google Login ไม่รองรับการใช้งานผ่านแอป LINE โดยตรง เพื่อความปลอดภัย
                      </p>
                      
                      <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 max-w-sm w-full text-left space-y-4">
                          <div className="flex items-center gap-4">
                              <div className="w-8 h-8 rounded-full bg-black text-white flex items-center justify-center font-bold text-sm shrink-0">1</div>
                              <span className="text-slate-600 text-sm">กดที่จุด 3 จุด <span className="font-bold">มุมขวาบน หรือ ล่าง</span></span>
                          </div>
                          <div className="flex items-center gap-4">
                              <div className="w-8 h-8 rounded-full bg-black text-white flex items-center justify-center font-bold text-sm shrink-0">2</div>
                              <span className="text-slate-600 text-sm">เลือก <span className="font-bold text-primary-600">"เปิดในเบราว์เซอร์เริ่มต้น"</span> หรือ <span className="font-bold text-blue-600">"Open in Safari"</span></span>
                          </div>
                      </div>
                  </div>
              );
          }
  
          // ✅ [4] Global Loading Screen (แสดงจนกว่าข้อมูลทุกอย่างจะพร้อม)
          // เงื่อนไข: รอ Auth + Config + Years
          const isGlobalLoading = authLoading || !isConfigLoaded || !isYearsLoaded;

          if (isGlobalLoading) {
              return (
                  <div className="fixed inset-0 z-[9999] flex flex-col h-screen items-center justify-center bg-[#F8FAFC]">
                      <div className="flex flex-col items-center animate-fade-in-up">
                          {/* Logo Animation */}
                          <div className="relative">
                              <div className="absolute inset-0 bg-primary-500 blur-xl opacity-20 rounded-full animate-pulse"></div>
                              <div className="relative w-24 h-24 bg-white rounded-3xl flex items-center justify-center shadow-glass mb-6 p-4 border border-white/50">
                                  <img 
                                      src="https://lh3.googleusercontent.com/d/1xjafr1kcWz1pA1IvCQR_2qHtMIgGj81u" 
                                      alt="Samsen Logo" 
                                      className="w-full h-full object-contain animate-bounce-slight"
                                  />
                              </div>
                          </div>
                          
                          <h1 className="text-2xl font-bold text-slate-700 font-display mb-2">Samsen IQA</h1>
                          
                          {/* Loading Bar */}
                          <div className="w-48 h-1.5 bg-slate-200 rounded-full overflow-hidden mt-4">
                              <div className="h-full bg-gradient-to-r from-primary-500 to-emerald-400 w-1/2 animate-[shimmer_1s_infinite_linear] relative">
                                  <div className="absolute inset-0 bg-white/30 skew-x-12"></div>
                              </div>
                          </div>
                          
                          <div className="text-slate-400 font-medium text-xs mt-3 animate-pulse">กำลังเตรียมข้อมูลระบบ...</div>
                      </div>
                      
                      {/* Style for shimmer animation */}
                      <style>{`
                          @keyframes shimmer {
                              0% { transform: translateX(-150%); }
                              100% { transform: translateX(250%); }
                          }
                      `}</style>
                  </div>
              );
          }
          // --- Maintenance Mode Check ---
          if (maintenanceMode && !isSuperAdmin) {
              return <MaintenanceScreen />;
          }

          return (
              <div className="flex h-screen overflow-hidden bg-[#F8FAFC]">
                  {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                  
                  {/* System Banner */}
                  {sysBanner && (
                      <div className="fixed top-0 left-0 right-0 z-[100] bg-red-500 text-white px-4 py-3 shadow-md flex items-center justify-between animate-fade-in-up">
                          <div className="flex items-center gap-3 container mx-auto max-w-7xl">
                              <div className="p-1.5 bg-white/20 rounded-lg"><Icon name="alert-triangle" className="w-5 h-5"/></div>
                              <div>
                                  <div className="font-bold text-sm">{sysBanner.title}</div>
                                  {sysBanner.content && <div className="text-xs text-red-100 mt-0.5">{sysBanner.content}</div>}
                              </div>
                          </div>
                          <button onClick={() => setSysBanner(null)} className="text-white/70 hover:text-white"><Icon name="x" className="w-5 h-5"/></button>
                      </div>
                  )}
                  
                  <ConfirmModal isOpen={confirmModal.isOpen} title={confirmModal.title} message={confirmModal.message} onConfirm={confirmModal.onConfirm} onCancel={() => setConfirmModal(prev => ({ ...prev, isOpen: false }))} isDangerous={confirmModal.isDangerous} />
                  <StatusEditModal isOpen={!!statusModal} data={statusModal || {}} onClose={() => setStatusModal(null)} onSave={handleStatusSave} />
      
                  {isSidebarOpen && window.innerWidth < 1280 && (
                      <div className="fixed inset-0 sidebar-overlay z-30" onClick={() => setIsSidebarOpen(false)}></div>
                  )}
                  {/* Sidebar Code */}
                  <aside className={`fixed xl:relative z-40 h-full w-[280px] glass-dark text-slate-300 transition-all duration-300 ease-in-out flex flex-col shadow-2xl shrink-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full xl:w-0 xl:-translate-x-0'} overflow-hidden`}>
                      <div className="p-8 flex items-center gap-4 cursor-pointer hover:opacity-80 transition-opacity" onClick={() => { setCurrentYear(null); setActiveItem(null); handleMobileMenuClick(); }}>
                          <div className="w-10 h-10 rounded-xl overflow-hidden shadow-glow bg-white flex items-center justify-center p-1">
                              <img 
                                  src="https://lh3.googleusercontent.com/d/1xjafr1kcWz1pA1IvCQR_2qHtMIgGj81u" 
                                  alt="Samsen Logo" 
                                  className="w-full h-full object-contain"
                              />
                          </div>
                          <div className="leading-tight">
                              <div className="text-[10px] font-bold uppercase tracking-widest text-primary-400 font-display">Samsen IQA</div>
                              <div className="text-xl font-bold text-white tracking-tight font-display">System</div>
                          </div>
                      </div>

                      <div className="px-6 pb-6 space-y-2">
                          {systemYears.length > 0 ? systemYears.map(year => (
                              <button key={year} onClick={() => handleYearSelect(year)} className={`w-full p-4 rounded-2xl flex items-center gap-4 transition-all duration-300 border active:scale-95 ${currentYear === year ? 'bg-primary-600 border-primary-500 text-white shadow-lg shadow-primary-900/50' : 'bg-white/5 border-white/5 hover:bg-white/10'}`}>
                                  <div className={`p-2 rounded-lg ${currentYear === year ? 'bg-white/20' : 'bg-white/5'}`}><Icon name="calendar" className="w-5 h-5" /></div>
                                  <span className="font-bold">ปีการศึกษา {year}</span>
                              </button>
                          )) : (
                              // Fallback for initial setup (if no years in DB yet)
                              <button onClick={() => handleYearSelect(2568)} className={`w-full p-4 rounded-2xl flex items-center gap-4 transition-all duration-300 border active:scale-95 ${currentYear === 2568 ? 'bg-primary-600 border-primary-500 text-white shadow-lg shadow-primary-900/50' : 'bg-white/5 border-white/5 hover:bg-white/10'}`}>
                                  <div className={`p-2 rounded-lg ${currentYear === 2568 ? 'bg-white/20' : 'bg-white/5'}`}><Icon name="calendar" className="w-5 h-5" /></div>

                                                                                          <a href={file.fileUrl} target="_blank" className="text-sm font-bold text-slate-700 truncate hover:text-indigo-600 block transition-colors">{file.fileName}</a>

                                                                          </div>

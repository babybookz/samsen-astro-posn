                                  >
                                      <option value={25}>25</option>
                                      <option value={50}>50</option>
                                      <option value={100}>100</option>
                                  </select>
                              </div>
                              {currentItems.length > 0 && (
                                  <button onClick={handleClearCurrentAuthLogs} className="px-3 py-1.5 bg-white border border-red-200 text-red-500 rounded-lg text-xs font-bold hover:bg-red-50 transition-colors shadow-sm active:scale-95 flex items-center justify-center gap-1 whitespace-nowrap">
                                      <Icon name="trash-2" className="w-3 h-3"/> ล้างหน้านี้
                                  </button>
                              )}
                          </div>
                      </div>

                      {/* ส่วนตาราง Table */}
                      <div className="overflow-x-auto flex-1">
                          <table className="w-full text-left border-collapse text-sm">
                              <thead className="bg-slate-50 text-slate-500 text-xs uppercase sticky top-0 z-10 shadow-sm bg-white">
                                  <tr>
                                      <th className="p-4 border-b w-32">เวลา</th>
                                      <th className="p-4 border-b w-40">ผู้ดำเนินการ</th>
                                      <th className="p-4 border-b w-32">กิจกรรม</th>
                                      <th className="p-4 border-b">รายละเอียด</th>
                                      <th className="p-4 border-b w-16 text-center">จัดการ</th>
                                  </tr>
                              </thead>
                              <tbody className="divide-y divide-slate-100">
                                  {isLogsLoading ? (
                                      <tr><td colSpan="5" className="p-10 text-center"><Icon name="loader" className="w-8 h-8 animate-spin mx-auto text-emerald-500"/></td></tr>
                                  ) : currentItems.length > 0 ? currentItems.map(log => (
                                      <tr key={log.id} className="hover:bg-slate-50/30 group transition-colors">
                                          <td className="p-4 text-slate-500 text-xs whitespace-nowrap font-display">
                                              {log.timestamp?.seconds ? new Date(log.timestamp.seconds * 1000).toLocaleString('th-TH') : '-'}
                                          </td>
                                          <td className="p-4 font-bold text-slate-700">
                                              <div className="flex items-center gap-2">
                                                  <div className="w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center text-[10px] overflow-hidden border border-white shadow-sm shrink-0">
                                                      {log.performedByPhoto ? <img src={log.performedByPhoto} className="w-full h-full object-cover" alt="avatar" /> : log.performedByName?.[0]}
                                                  </div>
                                                  <span className="truncate max-w-[120px]">{log.performedByName}</span>
                                              </div>
                                          </td>
                                          <td className="p-4">
                                              <span className={`px-2 py-1 rounded text-xs font-bold whitespace-nowrap ${log.action === 'Login' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-600'}`}>
                                                  {log.action}
                                              </span>
                                          </td>
                                          <td className="p-4 text-slate-600 text-xs md:text-sm">{log.details}</td>
                                          <td className="p-4 text-center">
                                              <button 
                                                  onClick={() => handleDeleteLog(log.id)} 
                                                  className="p-2 rounded-lg text-slate-300 hover:text-red-500 hover:bg-red-50 opacity-0 group-hover:opacity-100 transition-all active:scale-90"
                                                  title="ลบประวัตินี้"
                                              >
                                                  <Icon name="trash-2" className="w-4 h-4"/>
                                              </button>
                                          </td>
                                      </tr>
                                  )) : (
                                      <tr>
                                          <td colSpan="5" className="p-20 text-center text-slate-400">
                                              <Icon name="search-x" className="w-12 h-12 mx-auto mb-4 opacity-20"/>
                                              <p>ไม่พบข้อมูลประวัติการเข้าใช้งาน</p>
                                          </td>
                                      </tr>
                                  )}
                              </tbody>
                          </table>
                      </div>

                      {/* ส่วนแบ่งหน้า (Pagination แบบเดียวกับกิจกรรมระบบ) */}
                      <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                          <span className="text-xs text-slate-500 font-bold">
                              หน้า {safeCurrentPage} / {totalPages} | รายการทั้งหมด: {totalItems}
                          </span>
                          
                          <div className="flex items-center gap-2">
                              <button 
                                  onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                  disabled={safeCurrentPage === 1 || isLogsLoading}
                                  className="p-2 rounded-xl bg-white border border-slate-200 hover:bg-slate-50 disabled:opacity-50 transition-all active:scale-90"
                              >
                                  <Icon name="chevron-left" className="w-5 h-5"/>
                              </button>

                              <button 
                                  onClick={() => setCurrentPage(p => p + 1)}
                                  disabled={safeCurrentPage >= totalPages || isLogsLoading}
                                  className="p-2 rounded-xl bg-white border border-slate-200 hover:bg-slate-50 disabled:opacity-50 transition-all active:scale-90"
                              >
                                  <Icon name="chevron-right" className="w-5 h-5"/>
                              </button>
                          </div>
                      </div>
                  </div>
              );
          };


          // ฟังก์ชันซ่อมแซมชื่อหัวข้อและเกณฑ์ย่อยในฐานข้อมูล (เวอร์ชันอัปเกรด)
          const handleFixDatabaseTitles = async () => {
              if (!confirm("⚠️ คำเตือน: ระบบจะทำการอัปเดตชื่อหัวข้อและเกณฑ์ย่อยทั้งหมดให้ตรงกับเวอร์ชันปัจจุบัน ยืนยันหรือไม่?")) return;
              
              setIsCheckingIntegrity(true); 
              showToast("กำลังเริ่มอัปเดตฐานข้อมูล กรุณารอสักครู่...", "orange");

              try {
                  // ✅ เพิ่ม 'item_statuses' เข้ามาเพื่อซ่อมแซมป้ายสถานะด้วย
                  const collections = [
                      'evidences', 'templates', 'item_descriptions', 
                      'summary_templates', 'summary_submissions', 
                      'operation_result_templates', 'operation_result_submissions',
                      'item_statuses' 
                  ];
                  
                  // 1. สร้าง Map ของหัวข้อหลัก (เช่น "1.1.1" -> "1.1.1 มีความสามารถ...")
                  const newTitleMap = {};
                  STANDARDS_DATA.forEach(std => {
                      const items = std.subsections ? std.subsections.flatMap(sub => sub.items) : std.items;
                      items.forEach(item => {
                          const prefix = item.split(' ')[0]; 
                          newTitleMap[prefix] = item;
                      });
                  });

                  // 2. สร้าง Map ของเกณฑ์ย่อยจาก PERFORMANCE_TEXT
                  const criteriaMap = {};
                  Object.keys(PERFORMANCE_TEXT).forEach(mainTitle => {
                      criteriaMap[mainTitle] = {};
                      PERFORMANCE_TEXT[mainTitle].forEach(criteria => {
                          // ดึงเฉพาะตัวเลขและจุด เช่น "1." หรือ "2."
                          const match = criteria.match(/^(\d+\.)/);
                          if (match) {
                              criteriaMap[mainTitle][match[1]] = criteria;
                          }
                      });
                  });

                  let updatedCount = 0;

                  for (let col of collections) {
                      const snap = await db.collection(col).get();
                      const batch = db.batch();
                      let batchCount = 0;
                      
                      snap.docs.forEach(doc => {
                          const data = doc.data();
                          let needsUpdate = false;
                          let updates = {};

                          // --- ซ่อมแซมหัวข้อหลัก (itemTitle) ---
                          let currentItemTitle = data.itemTitle;
                          if (currentItemTitle) {
                              const titlePrefix = currentItemTitle.split(' ')[0]; 
                              const expectedTitle = newTitleMap[titlePrefix];
                              
                              if (expectedTitle && currentItemTitle !== expectedTitle) {
                                  updates.itemTitle = expectedTitle;
                                  currentItemTitle = expectedTitle; // อัปเดตตัวแปรไว้ใช้ต่อด้านล่าง
                                  needsUpdate = true;
                              }
                          }

                          // --- ซ่อมแซมเกณฑ์ย่อย (criteriaText) ---
                          if (data.criteriaText && currentItemTitle && criteriaMap[currentItemTitle]) {
                              // หาตัวเลขนำหน้าของเกณฑ์เดิม (รองรับทั้งแบบมี/ไม่มีเว้นวรรค)
                              const numMatch = data.criteriaText.match(/^(\d+\.)/);
                              if (numMatch) {
                                  const expectedCriteria = criteriaMap[currentItemTitle][numMatch[1]];
                                  if (expectedCriteria && data.criteriaText !== expectedCriteria) {
                                      updates.criteriaText = expectedCriteria;
                                      needsUpdate = true;
                                  }
                              }
                          }

                          // ถ้ามีการเปลี่ยนแปลง ให้ใส่ลงใน Batch
                          if (needsUpdate) {
                              batch.update(doc.ref, updates);
                              updatedCount++;
                              batchCount++;
                          }
                      });
                      
                      // รันคำสั่งอัปเดตของแต่ละ Collection
                      if (batchCount > 0) {
                          await batch.commit();
                      }
                  }
                  
                  showToast(`อัปเดตสำเร็จ! ซ่อมแซมเอกสารไปทั้งหมด ${updatedCount} รายการ`);
                  setTimeout(() => window.location.reload(), 2000);
                  
              } catch (error) {
                  console.error("Migration Error:", error);
                  showToast("เกิดข้อผิดพลาดในการอัปเดตข้อมูล", "error");
              } finally {
                  setIsCheckingIntegrity(false);
              }
          };

          // ++++++++++++++++++++++++++++++++++++++++++++++++++++++
          // 2. เริ่มส่วนที่เพิ่ม: Render Integrity UI
          // ++++++++++++++++++++++++++++++++++++++++++++++++++++++
          const renderIntegrity = () => (
              <div className="space-y-6 animate-fade-in-up">
                  <div className="bg-white rounded-2xl border border-slate-100 p-6 shadow-sm">
                      <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                          <div>
                              <h3 className="font-bold text-dark text-lg flex items-center gap-2">
                                  <Icon name="activity" className="w-5 h-5 text-primary-500"/> 
                                  ตรวจสอบไฟล์
                              </h3>
                              <p className="text-slate-500 text-sm mt-1">สแกนหาข้อมูลใน Database ที่ลิงก์ไฟล์เสีย</p>
                          </div>
                          <button 
                              onClick={handleCheckBrokenLinks} 
                              disabled={isCheckingIntegrity}
                              className={`px-6 py-3 rounded-xl font-bold text-white shadow-lg transition-all flex items-center gap-2 ${isCheckingIntegrity ? 'bg-slate-400 cursor-not-allowed' : 'bg-primary-600 hover:bg-primary-700 active:scale-95'}`}
                          >
                              {isCheckingIntegrity ? <><Icon name="loader" className="w-5 h-5 animate-spin"/> กำลังสแกน {integrityProgress}%</> : <><Icon name="search" className="w-5 h-5"/> สแกนหาไฟล์เสีย</>}
                          </button>

                          {/* ปุ่มอัปเดตชื่อหัวข้อ */}
                          <button 
                              onClick={handleFixDatabaseTitles} 
                              disabled={isCheckingIntegrity}
                              className={`px-6 py-3 rounded-xl font-bold text-white shadow-lg transition-all flex items-center gap-2 mt-2 md:mt-0 ${isCheckingIntegrity ? 'bg-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 active:scale-95'}`}
                          >
                              {isCheckingIntegrity ? <Icon name="loader" className="w-5 h-5 animate-spin"/> : <Icon name="refresh-cw" className="w-5 h-5"/>} 
                              {isCheckingIntegrity ? 'กำลังอัปเดต...' : 'อัปเดตชื่อหัวข้อเอกสาร'}
                          </button>
                      </div>
                      {isCheckingIntegrity && (
                          <div className="mt-6">
                              <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                                  <div className="h-full bg-primary-500 transition-all duration-300" style={{width: `${integrityProgress}%`}}></div>
                              </div>
                          </div>
                      )}
                  </div>

                  {brokenLinks.length > 0 && (
                      <div className="bg-white rounded-2xl border border-red-100 overflow-hidden shadow-sm animate-fade-in-up">
                          <div className="p-4 bg-red-50/50 border-b border-red-100 flex justify-between items-center">
                              <div className="flex items-center gap-3">
                                  <div className="w-8 h-8 rounded-full bg-red-100 text-red-500 flex items-center justify-center"><Icon name="alert-triangle" className="w-4 h-4"/></div>
                                  <h4 className="font-bold text-red-700">พบปัญหา {brokenLinks.length} รายการ</h4>
                              </div>
                              <button onClick={handleCleanUpGhostData} className="px-4 py-2 bg-red-500 text-white rounded-lg text-sm font-bold hover:bg-red-600 shadow-md transition-all active:scale-95 flex items-center gap-2">
                                  <Icon name="trash-2" className="w-4 h-4"/> ล้างข้อมูลขยะ
                              </button>
                          </div>
                          <div className="max-h-[400px] overflow-y-auto">
                              <table className="w-full text-left border-collapse text-sm">
                                  <thead className="bg-slate-50 text-slate-500 text-xs uppercase sticky top-0 z-10 shadow-sm bg-white">
                                      <tr><th className="p-4 border-b">ชื่อไฟล์</th><th className="p-4 border-b">หมวดหมู่</th><th className="p-4 border-b">สถานะ</th></tr>
                                  </thead>
                                  <tbody className="divide-y divide-slate-100">
                                      {brokenLinks.map((item, idx) => (
                                          <tr key={idx} className="hover:bg-red-50/10">
                                              <td className="p-4 font-bold text-slate-700">{item.title}</td>
                                              <td className="p-4 text-slate-500">{item.collectionLabel}</td>
                                              <td className="p-4 text-red-500 font-bold text-xs uppercase">{item.status}</td>
                                          </tr>
                                      ))}
                                  </tbody>
                              </table>
                          </div>
                      </div>
                  )}
                  
                  {!isCheckingIntegrity && brokenLinks.length === 0 && integrityProgress === 100 && (
                      <div className="text-center py-10 bg-white rounded-2xl border-2 border-dashed border-emerald-100">
                          <div className="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 text-emerald-500"><Icon name="check-circle" className="w-8 h-8"/></div>
                          <h3 className="font-bold text-emerald-700">ระบบสมบูรณ์</h3>
                          <p className="text-slate-400 text-sm">ไม่พบไฟล์เสียหาย</p>
                      </div>
                  )}
              </div>
          );

          return (
              <div className="space-y-6 pb-20">
                  {/* Top Navigation for Maintenance */}
                  <div className="flex overflow-x-auto pb-2 gap-2 scrollbar-hide border-b border-slate-200/50">
                      {[
                          { id: 'overview', label: 'ภาพรวมระบบ', icon: 'bar-chart-2' },
                          { id: 'users', label: 'ผู้ใช้งาน', icon: 'users' },
                          // ใน array ของ .map(tab => ...)
                          { id: 'years', label: 'ปีการศึกษา', icon: 'calendar' },
                          { id: 'deadline', label: 'ตั้งเวลาส่งงาน', icon: 'clock' }, // ✅ เพิ่มบรรทัดนี้ (อย่าลืม comma ข้างหลัง)
                          { id: 'storage', label: 'พื้นที่จัดเก็บ', icon: 'hard-drive' },
                          { id: 'logs', label: 'กิจกรรมระบบ', icon: 'file-text' },
                          { id: 'auth_logs', label: 'ประวัติเข้าใช้งาน', icon: 'log-in' },
                          { id: 'integrity', label: 'ตรวจสอบไฟล์', icon: 'shield-alert' }
                      ].map(tab => (
                          <button 
                              key={tab.id} 
                              onClick={() => setActiveSubTab(tab.id)}
                              className={`px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 whitespace-nowrap transition-all ${activeSubTab === tab.id ? 'bg-dark text-white shadow-lg shadow-slate-300' : 'bg-transparent text-slate-500 hover:bg-slate-100'}`}
                          >
                              <Icon name={tab.icon} className="w-4 h-4"/> {tab.label}
                          </button>
                      ))}
                  </div>

                  {activeSubTab === 'overview' && renderOverview()}
                  {activeSubTab === 'users' && renderUsers()}
                  {activeSubTab === 'years' && renderYears()}
                  {/* ✅ ส่วนตั้งเวลาส่งงาน (ใหม่) */}
                  {activeSubTab === 'deadline' && <DeadlineManager year={currentYear} standards={STANDARDS_DATA} users={users} showToast={showToast} db={db} user={user} />}
                  {/* ✅ ส่วนพื้นที่จัดเก็บ (เหลือบรรทัดเดียวแล้ว) */}
                  {activeSubTab === 'storage' && <StorageDashboard evidences={evidences} />}
                  {activeSubTab === 'logs' && renderLogs()}
                  {activeSubTab === 'auth_logs' && renderAuthLogs()}
                  {activeSubTab === 'integrity' && renderIntegrity()}
              </div>
          );
      };

      const MaintenanceScreen = () => (
          <div className="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center p-6 text-center">
              <div className="w-32 h-32 bg-orange-50 rounded-full flex items-center justify-center mb-6 animate-pulse">
                  <Icon name="cone" className="w-16 h-16 text-orange-500"/>
              </div>
              <h1 className="text-3xl font-bold text-dark mb-4">ระบบปิดปรับปรุงชั่วคราว</h1>
              <p className="text-slate-500 max-w-md mb-8">
                  เรากำลังปรับปรุงระบบเพื่อให้ทำงานได้ดียิ่งขึ้น กรุณากลับมาใหม่ในภายหลัง
                  ขออภัยในความไม่สะดวก
              </p>
              <div className="text-xs text-slate-400">Samsen IQA System Maintenance</div>
          </div>
      );

    // --- Helper: แปลง Bytes เป็นหน่วยที่อ่านง่าย ---
      const formatBytes = (bytes, decimals = 2) => {
          if (!+bytes) return '0 Bytes';
          const k = 1024;
          const dm = decimals < 0 ? 0 : decimals;
          const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB'];
          const i = Math.floor(Math.log(bytes) / Math.log(k));
          return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
      };

      // --- Component หลัก: Storage Visualizer ---
      // Component: หน้าจอ Dashboard จัดการพื้นที่ (เวอร์ชันเจาะจงโฟลเดอร์)
      // --- Component: หน้าจอ Dashboard จัดการพื้นที่ (เวอร์ชันอัปเกรด: นับแยกประเภท & แยกมาตรฐาน) ---
      const StorageDashboard = () => {
          const [storageInfo, setStorageInfo] = useState({ totalSize: 0, years: [], lastUpdate: '', loading: true });
          const [fileStats, setFileStats] = useState({
              total: 0,
              byCategory: { summary: 0, opResult: 0, evidence: 0, other: 0 },
              byStandard: [] 
          });
          const [loadingStats, setLoadingStats] = useState(true);

          useEffect(() => {
              // 1. เรียก Google Script เพื่อดูขนาดไฟล์ (Bytes)
              try {
                  google.script.run
                      .withSuccessHandler(res => {
                          if(res.status === 'success') {
                              setStorageInfo({ 
                                  totalSize: res.totalSize, 
                                  years: res.years, 
                                  lastUpdate: res.lastUpdate,
                                  loading: false 
                              });
                          } else {
                              setStorageInfo(prev => ({ ...prev, loading: false }));
                          }
                      })
                      .withFailureHandler(err => {
                          console.error("Storage Error:", err);
                          setStorageInfo(prev => ({ ...prev, loading: false }));
                      })
                      .getSystemStorageUsage();
              } catch (e) { console.log("Dev mode skip"); }

              // 2. ดึงข้อมูลจำนวนไฟล์จาก Firestore (แก้ใหม่: ค้นหา Standard ID จาก Item Title ถ้าไม่มีใน DB)
              const fetchFileStats = async () => {
                  setLoadingStats(true);
                  try {
                      const [evidencesSnap, summarySnap, opResultSnap, otherDocsSnap] = await Promise.all([
                          db.collection('evidences').get(),
                          db.collection('summary_submissions').get(),
                          db.collection('operation_result_submissions').get(),
                          db.collection('other_documents').get()
                      ]);

                      const stats = {
                          total: 0,
                          byCategory: {
                              summary: summarySnap.size,
                              opResult: opResultSnap.size,
                              evidence: evidencesSnap.size,
                              other: otherDocsSnap.size
                          },
                          byStandard: {}
                      };

                      stats.total = stats.byCategory.summary + stats.byCategory.opResult + stats.byCategory.evidence + stats.byCategory.other;

                      // --- ฟังก์ชันช่วยนับ (ฉลาดขึ้น) ---
                      const tallyStandard = (doc) => {
                          const data = doc.data();
                          let stdId = data.standardId;

                          // 1. ถ้าไม่มี standardId ใน DB ให้ลองหาจาก itemTitle
                          if (!stdId && data.itemTitle) {
                              // วนหาใน STANDARDS_DATA ว่า itemTitle นี้อยู่มาตรฐานไหน
                              const foundStd = STANDARDS_DATA.find(s => {
                                  // กรณีมี subsections
                                  if (s.subsections) {
                                      return s.subsections.some(sub => sub.items.includes(data.itemTitle));
                                  }
                                  // กรณีไม่มี subsections (ถ้ามีเคสนี้)
                                  if (s.items) {
                                      return s.items.includes(data.itemTitle);
                                  }
                                  return false;
                              });

                              if (foundStd) {
                                  stdId = foundStd.id;
                              }
                          }

                          // 2. ถ้ารู้แล้วว่าอยู่มาตรฐานไหน ก็นับเพิ่ม
                          if (stdId) {
                              stats.byStandard[stdId] = (stats.byStandard[stdId] || 0) + 1;
                          }
                      };

                      // วนลูปนับทุก Collection
                      evidencesSnap.forEach(tallyStandard);
                      summarySnap.forEach(tallyStandard);
                      opResultSnap.forEach(tallyStandard);
                      // other_documents มักจะไม่มีมาตรฐาน หรือ user เลือกเอง (ถ้ามี field ก็จะนับรวม)
                      otherDocsSnap.forEach(tallyStandard); 

                      // จัดรูปแบบข้อมูลสำหรับแสดงผล
                      const standardData = Object.keys(stats.byStandard).map(key => {
                          const std = STANDARDS_DATA.find(s => s.id === key);
                          return {
                              id: key,
                              name: std ? std.title.split(':')[0] : key,
                              fullName: std ? std.title : 'ไม่ระบุ',

                          ...stats,
                          byStandard: standardData
                      });

                  { id: "2.4", title: "พัฒนาครูและบุคลากรให้มีความเชี่ยวชาญทางวิชาชีพ", items: [ { q: "1. กระบวนการนิเทศการปฏิบัติงานของครูและบุคลากรทางการศึกษาอย่างเป็นระบบ", max: 1 }, { q: "2. การพัฒนาครูและบุคลากรทางการศึกษาตามมาตรฐานวิชาชีพ", max: 0.5 }, { q: "3. การพัฒนาครูและบุคลากรทางการศึกษาตามแผนการพัฒนาครูและบุคลากรทางการศึกษาของสถานศึกษา", max: 1 }, { q: "4. การสร้างชุมชนแห่งการเรียนรู้ทางวิชาชีพ", max: 0.5 } ]},
                  { id: "2.5", title: "จัดสภาพแวดล้อมทางกายภาพและสังคมที่เอื้อต่อการจัดการเรียนรู้อย่างมีคุณภาพ", items: [ { q: "1. ห้องเรียน ห้องปฏิบัติการ อาคารเรียนมั่นคง สะอาดและปลอดภัย มีสิ่งอำนวยความ สะดวก พอเพียง อยู่ในสภาพใช้การได้ดี สภาพแวดล้อมร่มรื่นและมีแหล่งเรียนรู้สำหรับ ผู้เรียน", max: 1 }, { q: "2. จัดโครงการ/กิจกรรมที่ส่งเสริมสุขภาพอนามัยและความปลอดภัยของผู้เรียน", max: 1 }, { q: "3. จัดห้องสมุด/แหล่งเรียนรู้ภายในสถานศึกษาที่ให้บริการสื่อและเทคโนโลยีสารสนเทศที่เอื้อให้ผู้เรียนเรียนรู้ด้วยตนเองและหรือเรียนรู้แบบมีส่วนร่วม", max: 1 } ]},
                  { id: "2.6", title: "จัดระบบเทคโนโลยีสารสนเทศเพื่อสนับสนุนการบริหารจัดการและการจัดการเรียนรู้", items: [ { q: "1. การบริหารจัดการระบบเทคโนโลยีสารสนเทศเพื่อสนับสนุนการบริหารจัดการ", max: 1 }, { q: "2. บริหารจัดการระบบเทคโนโลยีสารสนเทศเพื่อสนับสนุนการจัดการเรียนรู้", max: 1 } ]}
              ],
              3: [
                  { id: "หน้าสรุป", title: "สรุปผลการประเมินมาตรฐานที่ 3: กระบวนการจัดการเรียนสอนที่เน้นผู้เรียนเป็นสำคัญ", isSummary: true, items: [] },
                  { id: "3.1", title: "จัดการเรียนรู้ผ่านกระบวนการคิดและปฏิบัติจริง และสามารถนำไปประยุกต์ใช้ในชีวิตได้", items: [ { q: "1. มีการสนับสนุนให้ครูจัดกระบวนการเรียนรู้ที่ให้ผู้เรียนได้ลงมือปฏิบัติจริงจนสรุปความรู้ได้ด้วยตนเอง", max: 2.5 }, { q: "2. มีการจัดกิจกรรมการเรียนรู้ที่เสริมสร้างสมรรถนะและคุณลักษณะที่พึงประสงค์", max: 2.5 } ]},
                  { id: "3.2", title: "ใช้สื่อ เทคโนโลยีสารสนเทศและแหล่งเรียนรู้ที่เอื้อต่อการเรียนรู้", items: [ { q: "1. ใช้สื่อ เทคโนโลยีสารสนเทศและแหล่งเรียนรู้ที่เอื้อต่อการเรียนรู้", max: 5 } ]},
                  { id: "3.3", title: "มีการบริหารจัดการชั้นเรียนเชิงบวก", items: [ { q: "1. ครูกำหนดเป้าหมายคุณภาพผู้เรียนทั้งด้านความรู้ ทักษะกระบวนการ สมรรถนะและคุณลักษณะที่พึงประสงค์", max: 1 }, { q: "2. ครูวิเคราะห์ผู้เรียนเป็นรายบุคคล และใช้ข้อมูลในการวางแผนการจัดการเรียนรู้เพื่อพัฒนาศักยภาพของผู้เรียน", max: 1 }, { q: "3. ครูออกแบบและจัดการเรียนรู้ที่ตอบสนองความแตกต่างระหว่างบุคคลและพัฒนาการทางสติปัญญา", max: 1 }, { q: "4. ครูจัดบรรยากาศที่เอื้อต่อการเรียนรู้ และดูแลช่วยเหลือผู้เรียนให้เกิดการเรียนรู้", max: 1 }, { q: "5. ครูให้คำแนะนำ คำปรึกษา และแก้ไขปัญหาให้แก่ผู้เรียนทั้งด้านการเรียนและคุณภาพชีวิตด้วยความเสมอภาคและมีความสุขในการเรียนรู้", max: 1 } ]},
                  { id: "3.4", title: "ตรวจสอบและประเมินผู้เรียนอย่างเป็นระบบ และนำผลมาพัฒนาผู้เรียน", items: [ { q: "1. ครูวัดและประเมินผลการเรียนรู้ของผู้เรียนอย่างเป็นระบบและต่อเนื่อง", max: 2.5 }, { q: "2. ครูทำวิจัยในชั้นเรียนและนำผลไปปรับปรุงพัฒนาการจัดการเรียนรู้", max: 2.5 } ]},
                  { id: "3.5", title: "มีการแลกเปลี่ยนเรียนรู้และให้ข้อมูลสะท้อนกลับเพื่อพัฒนาและปรับปรุงการจัดการเรียนรู้", items: [ { q: "1. นิเทศภายใน กำกับ ติดตามตรวจสอบ และนำผลไปปรับปรุงการเรียนการสอนอย่าง สม่ำเสมอ", max: 5 } ]}
              ],
              4: [
                  { id: "หน้าสรุป", title: "สรุปผลการประเมินมาตรฐานที่ 4: สถานศึกษามีศักยภาพในการพัฒนาผู้เรียนในโลกยุคปัจจุบัน มีโครงการพิเศษและการพัฒนา ช่วยเหลือสถานศึกษาอื่น ชุมชนและสังคม", isSummary: true, items: [] },
                  { id: "4.1", title: "โครงการพิเศษเพื่อยกระดับคุณภาพการศึกษาตามแนวปฏิรูปการศึกษา/สร้างความโดดเด่นให้สถานศึกษา", items: [ { q: "1. โครงการพิเศษเพื่อยกระดับคุณภาพการศึกษาตามแนวปฏิรูปการศึกษา/สร้างความโดดเด่นให้สถานศึกษา", max: 2.5 } ]},
                  { id: "4.2", title: "พัฒนาช่วยเหลือสถานศึกษาอื่น ชุมชนและสังคม", items: [ { q: "1. พัฒนาช่วยเหลือสถานศึกษาอื่น ชุมชนและสังคม", max: 2.5 } ]}
              ]
          };

          // ✅ เปลี่ยนค่าเริ่มต้นให้แสดงหน้า 'ALL' (ภาพรวมทั้งหมด) แทนที่จะเป็น 1
          const [currentStd, setCurrentStd] = useState('ALL'); 
          const [currentPageIdx, setCurrentPageIdx] = useState(0);
          const [appData, setAppData] = useState({});
          
          // ✅ สร้าง State ดึงข้อมูลทั้ง 4 มาตรฐานมาเก็บไว้พร้อมกัน
          const [allAppData, setAllAppData] = useState({ 1: {}, 2: {}, 3: {}, 4: {} }); 
          const [isSaving, setIsSaving] = useState(false);

          // ✅ ชุดสีแยกตามมาตรฐาน (ซ่อนถ้าเป็นหน้า ALL)
          const activeTheme = currentStd === 'ALL' ? null : {
              1: { text: "text-blue-600", textDark: "text-blue-800", textLight: "text-blue-400", bg: "bg-blue-50", bgActive: "bg-blue-100", border: "border-blue-200", borderActive: "border-blue-600", ring: "focus:ring-blue-500 ring-blue-500", header: "bg-blue-800", badge: "bg-blue-700", gradient: "from-blue-600 to-blue-500", shadow: "shadow-blue-500/30", tableRow: "bg-blue-50/30 group-hover:bg-blue-50/50" },
              2: { text: "text-orange-600", textDark: "text-orange-800", textLight: "text-orange-400", bg: "bg-orange-50", bgActive: "bg-orange-100", border: "border-orange-200", borderActive: "border-orange-500", ring: "focus:ring-orange-500 ring-orange-500", header: "bg-orange-700", badge: "bg-orange-600", gradient: "from-orange-500 to-orange-400", shadow: "shadow-orange-500/30", tableRow: "bg-orange-50/30 group-hover:bg-orange-50/50" },
              3: { text: "text-emerald-600", textDark: "text-emerald-800", textLight: "text-emerald-400", bg: "bg-emerald-50", bgActive: "bg-emerald-100", border: "border-emerald-200", borderActive: "border-emerald-600", ring: "focus:ring-emerald-500 ring-emerald-500", header: "bg-emerald-800", badge: "bg-emerald-700", gradient: "from-emerald-600 to-emerald-500", shadow: "shadow-emerald-500/30", tableRow: "bg-emerald-50/30 group-hover:bg-emerald-50/50" },
              4: { text: "text-purple-600", textDark: "text-purple-800", textLight: "text-purple-400", bg: "bg-purple-50", bgActive: "bg-purple-100", border: "border-purple-200", borderActive: "border-purple-600", ring: "focus:ring-purple-500 ring-purple-500", header: "bg-purple-800", badge: "bg-purple-700", gradient: "from-purple-600 to-purple-500", shadow: "shadow-purple-500/30", tableRow: "bg-purple-50/30 group-hover:bg-purple-50/50" }
          }[currentStd];

          // ✅ ดึงข้อมูลทั้ง 4 มาตรฐานมาเก็บไว้รวดเดียว
          useEffect(() => {
              // เพิ่มการเช็ค currentYear ตรงนี้
              if (!user || !currentYear) return; 
              
              const loadAllData = async () => {
                  try {
                      const fetchedData = { 1: {}, 2: {}, 3: {}, 4: {} };
                      
                      // 🌟 แก้ไข: เติม _${currentYear} ต่อท้ายชื่อ Doc
                      const promises = [1, 2, 3, 4].map(num => db.collection('evaluations').doc(`school_std${num}_${currentYear}`).get());
                      const results = await Promise.all(promises);
                      
                      results.forEach((doc, idx) => {
                          if (doc.exists && doc.data().data) {
                              fetchedData[idx + 1] = doc.data().data;
                          }
                      });
                      
                      setAllAppData(fetchedData);
                      
                      if (currentStd !== 'ALL') {
                          setAppData(fetchedData[currentStd] || {});
                      }
                  } catch (err) {
                      console.error("Load Data Error:", err);
                  }
              };
              loadAllData();
          }, [user, db, currentYear]); // 🌟 เพิ่ม currentYear ใน dependency

          // ✅ เมื่อเปลี่ยน Tab มาตรฐาน ให้เปลี่ยน AppData ด้วย
          useEffect(() => {
              if (currentStd !== 'ALL') {
                  setAppData(allAppData[currentStd] || {});
              }
          }, [currentStd, allAppData]);


          const getQuality = (score, max) => {
              if (max === 0) return { level: 0, label: "-" };
              const percent = (score / max) * 100;
              if (percent >= 90) return { level: 5, label: "ยอดเยี่ยม" };
              if (percent >= 80) return { level: 4, label: "ดีเลิศ" };
              if (percent >= 70) return { level: 3, label: "ดี" };
              if (percent >= 60) return { level: 2, label: "ปานกลาง" };
              return { level: 1, label: "กำลังพัฒนา" };
          };

          const handleScoreChange = (key, val, max) => {
              let numericVal = parseFloat(val);
              if (numericVal > max) numericVal = max;
              if (numericVal < 0 || isNaN(numericVal)) numericVal = "";
              setAppData(prev => ({ ...prev, [key]: numericVal }));
          };

          const handleTextChange = (key, val) => {
              setAppData(prev => ({ ...prev, [key]: val }));
          };

          // ใช้สำหรับคำนวณในหน้าย่อย (เหมือนเดิม)
          const calculatePageStats = (topicObj, pIdx) => {
              let earned = 0; let max = 0;
              topicObj.items.forEach((item, qIdx) => {
                  earned += parseFloat(appData[`s${currentStd}_p${pIdx}_q${qIdx}`]) || 0;
                  max += item.max;
              });
              return { earned, max, qual: getQuality(earned, max) };
          };

          const calculateOverallStats = () => {
              let totalEarned = 0; let totalMax = 0;
              standardData[currentStd].forEach((t, pIdx) => {
                  if (t.isSummary) return;
                  t.items.forEach((item, qIdx) => {
                      totalEarned += parseFloat(appData[`s${currentStd}_p${pIdx}_q${qIdx}`]) || 0;
                      totalMax += item.max;
                  });
              });
              const percent = totalMax > 0 ? (totalEarned / totalMax) * 100 : 0;
              return { totalEarned, totalMax, percent, qual: getQuality(totalEarned, totalMax) };
          };

          const saveSpecificData = async (additionalData = {}, successMsg = "บันทึกเรียบร้อย") => {
              if (!user) return showToast("กรุณาเข้าสู่ระบบก่อนบันทึก", "error");
              setIsSaving(true);
              try {
                  const newData = { ...appData, ...additionalData };
                  setAppData(newData); 
                  setAllAppData(prev => ({ ...prev, [currentStd]: newData }));

                  // 🌟 แก้ไข: เติม _${currentYear} ต่อท้ายชื่อ Doc และเซฟค่า year ลงไปด้วย
                  await db.collection('evaluations').doc(`school_std${currentStd}_${currentYear}`).set({
                      userId: user.uid,
                      userName: user.displayName || user.email,
                      standard: currentStd,
                      year: currentYear, // เพิ่มบรรทัดนี้
                      data: newData,
                      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                  }, { merge: true });
                  
                  if (successMsg !== "บันทึกคะแนนอัตโนมัติ") {
                      // บันทึก Log เฉพาะตอนที่ผู้ใช้กดปุ่ม "ยืนยันข้อมูลหน้านี้" (ไม่เอาตอนพิมพ์ตัวเลขแล้ว auto-save)
                      logSystemActivity(db, user, 'Evaluate', `บันทึกและยืนยันผลประเมิน มาตรฐานที่ ${currentStd}`);
                  }

                  if (successMsg) showToast(successMsg);
              } catch (error) {
                  console.error("Firebase Save Error:", error);
                  showToast("ไม่สามารถบันทึกได้ โปรดตรวจสอบสิทธิ์ Firebase Rules", "error");
              }
              setIsSaving(false);
          };

          const handleClearData = async () => {
              if (!window.confirm(`⚠️ คำเตือน!\nคุณต้องการล้างข้อมูลคะแนนและคำอธิบายของ "มาตรฐานที่ ${currentStd}" ทั้งหมดใช่หรือไม่?\n(ข้อมูลจะถูกลบถาวร ไม่สามารถกู้คืนได้)`)) return;
              
              setIsSaving(true);
              try {
                  setAppData({});
                  setAllAppData(prev => ({ ...prev, [currentStd]: {} }));
                  
                  // 🌟 แก้ไขจุดนี้: เติม _${currentYear} เข้าไปที่ชื่อ Doc ให้ตรงกับตอนเซฟ
                  await db.collection('evaluations').doc(`school_std${currentStd}_${currentYear}`).delete();

                  logSystemActivity(db, user, 'Clear Evaluation', `ล้างข้อมูลประเมินทั้งหมด ในมาตรฐานที่ ${currentStd}`);
                  
                  showToast(`ล้างข้อมูลมาตรฐานที่ ${currentStd} เรียบร้อยแล้ว`);
              } catch (error) {
                  console.error("Clear Data Error:", error);
                  showToast("เกิดข้อผิดพลาดในการล้างข้อมูล", "error");
              }
              setIsSaving(false);
          };

          const topics = currentStd !== 'ALL' ? standardData[currentStd] : [];
          const currentTopic = currentStd !== 'ALL' ? topics[currentPageIdx] : null;
          const isSummary = currentTopic ? currentTopic.isSummary : false;
          const pageStats = isSummary || currentStd === 'ALL' ? null : calculatePageStats(currentTopic, currentPageIdx);
          const overallStats = currentStd !== 'ALL' ? calculateOverallStats() : null;
          const prefix = isSummary ? `s${currentStd}_summary` : `s${currentStd}_p${currentPageIdx}`;

          return (
              <div className="flex flex-col h-full w-full bg-slate-50 font-sarabun z-20">
                  
                  {/* 1. แถบเลือกมาตรฐานหลัก */}
                  <div className="bg-white shadow-sm border-b shrink-0 flex overflow-x-auto custom-scrollbar px-4 md:px-8 pt-2 pb-2">
                      <div className="flex flex-wrap gap-2">
                          <button 
                              onClick={() => { setCurrentStd('ALL'); setCurrentPageIdx(0); }} 
                              className={`px-6 py-2.5 rounded-2xl font-bold transition-all shadow-sm flex items-center gap-2 active:scale-95 ${
                                  currentStd === 'ALL' 
                                  ? 'bg-slate-800 text-white shadow-lg' 
                                  : 'bg-white border border-slate-200 text-slate-500 hover:bg-slate-50'
                              }`}
                          >
                              <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs ${currentStd === 'ALL' ? 'bg-white/20' : 'bg-slate-100'}`}>
                                  <Icon name="bar-chart-2" className="w-4 h-4"/>
                              </div>
                              ภาพรวมทั้งหมด
                          </button>

                          {[1, 2, 3, 4].map(num => (
                              <button 
                                  key={num} 
                                  onClick={() => { setCurrentStd(num); setCurrentPageIdx(0); }} 
                                  className={`px-6 py-2.5 rounded-2xl font-bold transition-all shadow-sm flex items-center gap-2 active:scale-95 ${
                                      currentStd === num 
                                      ? 'bg-dark text-white shadow-lg' 
                                      : 'bg-white border border-slate-200 text-slate-500 hover:bg-slate-50'
                                  }`}
                              >
                                  <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs ${currentStd === num ? 'bg-white/20' : 'bg-slate-100'}`}>
                                      {num}
                                  </div>
                                  มาตรฐานที่ {num}
                              </button>
                          ))}
                      </div>
                  </div>

                  {/* 2. เมนูย่อย (แสดงเฉพาะตอนเจาะจงมาตรฐาน 1-4) */}
                  {currentStd !== 'ALL' && (
                      <div className="bg-white border-b border-slate-200 px-4 py-3 flex items-center overflow-x-auto gap-2 custom-scrollbar shrink-0 shadow-sm print-hidden">
                          <span className={`text-xs font-bold uppercase tracking-widest mr-2 shrink-0 hidden md:block ${activeTheme.text}`}>
                              <Icon name="list" className="w-4 h-4 inline mr-1"/> เลือกหัวข้อย่อย:
                          </span>
                          {topics.map((topic, idx) => (
                              <button 
                                  key={idx} 
                                  onClick={() => setCurrentPageIdx(idx)} 
                                  className={`px-4 py-2 rounded-xl text-sm font-bold transition-all border active:scale-95 shrink-0 ${
                                      idx === currentPageIdx 
                                      ? `${activeTheme.bgActive} ${activeTheme.textDark} ${activeTheme.borderActive} shadow-sm ring-1 ${activeTheme.ring}` 
                                      : 'bg-slate-50 text-slate-500 border-transparent hover:bg-slate-100 hover:border-slate-200'
                                  }`}
                              >
                                  {topic.id === "หน้าสรุป" ? "สรุปผลมาตรฐาน" : topic.id}
                              </button>
                          ))}
                      </div>
                  )}

                  {/* 3. Main Evaluation Area */}

              const hash = window.location.hash;
              if (hash.includes('tab=')) {
                  const params = new URLSearchParams(hash.replace('#', '?'));
                  const tab = params.get('tab');
                  const item = params.get('item');

                  if (tab) {
                      isPopStateTriggered.current = true;
                      setActiveTab(tab);
                  }
                  if (item) {
                      isPopStateTriggered.current = true;
                      setActiveItem(item);
                  }
                  // แทนที่ History ปัจจุบัน
                  window.history.replaceState({ tab: tab || 'dashboard', item: item || null }, "", hash);
              } else {
                  // ถ้าไม่มี Hash ให้ตั้งค่าเริ่มต้น
                  window.history.replaceState({ tab: 'dashboard', item: null }, "", "#tab=dashboard");
              }

              // ฟังก์ชันทำงานเมื่อกดปุ่ม Back / Forward
              const handlePopState = (event) => {
                  if (event.state) {
                      isPopStateTriggered.current = true;
                      setActiveTab(event.state.tab || 'dashboard');

          const handleDrag = (e) => { e.preventDefault(); e.stopPropagation(); if (e.type === "dragenter" || e.type === "dragover") setDragActive(true); else if (e.type === "dragleave") setDragActive(false); };
          const handleDrop = (e) => { e.preventDefault(); e.stopPropagation(); setDragActive(false); if (e.dataTransfer.files) setSelectedFiles(Array.from(e.dataTransfer.files).slice(0, 5)); };

                  const oversizedFiles = files.filter(file => file.size > MAX_SIZE);
                  
                  if (oversizedFiles.length > 0) {

          };

          const uploadFileResumable = async (file, standard, itemTitle, subTitle, year, onProgressUpdate) => {
              try {
                  const uploadUrl = await new Promise((resolve, reject) => {
                      google.script.run
                          .withSuccessHandler(url => url.startsWith("Error:") ? reject(url) : resolve(url))
                          .withFailureHandler(reject)
                          .initiateResumableUpload(file.name, file.type, standard.title, itemTitle, subTitle, year);
                  });

                  const chunkSize = 2 * 1024 * 1024; 
                  let startByte = 0;
                  let result = null;

                  while (startByte < file.size) {
                      // เช็คการยกเลิกก่อนส่งแต่ละ Chunk
                      if (abortUploadRef.current) throw new Error("Upload cancelled by user");

                      const endByte = Math.min(startByte + chunkSize, file.size);
                      const blobChunk = file.slice(startByte, endByte);
                      
                      const base64Chunk = await new Promise((resolve) => {
                          const reader = new FileReader();
                          reader.onload = () => resolve(reader.result.split(',')[1]);
                          reader.readAsDataURL(blobChunk);
                      });

                      result = await new Promise((resolve, reject) => {
                          google.script.run
                              .withSuccessHandler(res => resolve(res))
                              .withFailureHandler(err => reject(err))
                              .uploadChunk(uploadUrl, base64Chunk, startByte, file.size);
                      });

                      if (result.status === 'Complete') break;
                      
                      startByte = result.nextStart;
                      
                      // ส่ง % ของไฟล์ปัจจุบันกลับไปคำนวณ Progress รวม
                      const currentFilePercent = (startByte / file.size) * 100;
                      if (onProgressUpdate) onProgressUpdate(currentFilePercent);
                  }
                  return result.url; 
              } catch (err) {
                  throw err; 
              }
          };

          // ✅ [แก้ไขใหม่] ฟังก์ชันตรวจสอบสิทธิ์การส่งงาน (สิทธิพิเศษต้องมาก่อน)
          const isSubmissionLocked = useCallback((standardId) => {
              // 1. SuperAdmin ผ่านตลอด
              if (isSuperAdmin) return false;

              const globalRule = submissionRules['GLOBAL'];
              const specificRule = submissionRules[standardId];
              const now = new Date();

              // 2. เช็คสิทธิพิเศษ (Exception) ของ Global ก่อน
              if (user && globalRule?.exceptions?.[user.uid]) {
                  const expiry = globalRule.exceptions[user.uid].toDate();
                  if (now < expiry) return false; // ถ้ามีสิทธิพิเศษและยังไม่หมดเวลา ให้ผ่านเลย (ส่งได้)
              }
              // 3. ถ้าไม่มีสิทธิพิเศษ Global ให้เช็คว่า Global ปิดอยู่ไหม
              else if (globalRule && globalRule.isActive === false) {
                  return true; // ถ้าปิดอยู่ ล็อกทันที
              }

              // 4. หากฎรายมาตรฐาน (ถ้าไม่มีใช้ Global แทน)
              const rule = specificRule || globalRule; 
              if (!rule) return false;

              // 5. เช็คสิทธิพิเศษ (Exception) ของรายมาตรฐาน
              if (user && rule.exceptions && rule.exceptions[user.uid]) {
                  const expiry = rule.exceptions[user.uid].toDate();
                  if (now < expiry) return false; // ปลดล็อกให้คนนี้ผ่านเลย (ส่งได้)
              }

              // 6. ถ้าไม่มีสิทธิพิเศษ ค่อยมาเช็คสวิตช์และเวลาปกติ
              if (rule.isActive === false) return true; // สวิตช์ปิด = ล็อก
              if (rule.startDate && now < rule.startDate) return true; // ยังไม่ถึงเวลา = ล็อก
              if (rule.endDate && now > rule.endDate) return true; // เลยเวลา = ล็อก

              return false; // ผ่านทุกด่าน
          }, [isSuperAdmin, submissionRules, user]);

          const handleUpload = async (e) => {
              e.preventDefault();
              
              // 1. เช็คสิทธิ์
              if (isSubmissionLocked(activeTab)) {
                  showToast("ระบบปิดรับการส่งงานสำหรับหัวข้อนี้แล้ว", "error");
                  return;
              }

              setUploading(true);
              setProgress(0);
              abortUploadRef.current = false;
              setAbortUpload(false);

              // 2. เตรียมข้อมูล
              const standard = STANDARDS_DATA.find(s => s.id === activeTab);
              const itemTitle = selectedItem || "";
              let subTitle = "";
              if (standard && standard.subsections) {
                  const foundSub = standard.subsections.find(sub => sub.items.includes(itemTitle));
                  if (foundSub) subTitle = foundSub.title;
              }

              const totalFiles = selectedFiles.length;
              let completedCount = 0;

              // 3. เริ่มวนลูป
              for (let i = 0; i < totalFiles; i++) {
                  const file = selectedFiles[i];
                  if (abortUploadRef.current) break;

                  const MAX_SIZE = 30 * 1024 * 1024; 
                  if (file.size > MAX_SIZE) {
                      showToast(`ไฟล์ ${file.name} ใหญ่เกิน 30MB (ข้าม)`, 'error');
                      continue; 
                  }

                  // --- [START] ระบบตัวเลขวิ่ง (Simulation) ---
                  const startRange = (i / totalFiles) * 100;
                  const endRange = ((i + 1) / totalFiles) * 100;

                  const progressInterval = setInterval(() => {
                      setProgress(prev => {
                          const limit = (i === totalFiles - 1) ? 99 : endRange - 1;

                          if (prev >= limit) return limit; 

                          // สูตรคำนวณความเร็ว
                          const remaining = limit - prev;
                          let step = 0;
                          
                          if (remaining > 20) step = (1 + Math.random() * 2) / 2; 
                          else if (remaining > 5) step = (0.2 + Math.random() * 0.5) / 2;
                          else step = (0.05 + Math.random() * 0.1) / 2;

                          return prev + step;
                      });
                  }, 200); // แก้จาก 00 เป็น 200
                  // --- [END] ---

                  try {
                      const fileUrl = await new Promise((resolve, reject) => {
                          const reader = new FileReader();
                          
                          reader.onload = (event) => {
                              google.script.run
                                  .withSuccessHandler(url => url.startsWith("Error:") ? reject(url) : resolve(url))
                                  .withFailureHandler(reject)
                                  .uploadFileToDrive(
                                      event.target.result, 
                                      file.name, 
                                      standard.title, 
                                      itemTitle, 
                                      subTitle, 
                                      currentYear
                                  );
                          };
                          
                          reader.onerror = error => reject(error);
                          reader.readAsDataURL(file); 
                      });

                      if (abortUploadRef.current) {
                          clearInterval(progressInterval);
                          break;
                      }

                      await db.collection('evidences').add({
                          title: file.name.split('.').slice(0, -1).join('.'),
                          fileName: file.name,
                          fileUrl: fileUrl,
                          year: currentYear,
                          standardId: activeTab,
                          subsectionTitle: subTitle,
                          itemTitle: itemTitle,
                          uploader: user.uid,
                          uploaderName: user.displayName || user.email,
                          createdAt: firebase.firestore.FieldValue.serverTimestamp()
                      });

    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback, useMemo } = React;

      // ========================================================
      // 👉 1. วางฟังก์ชัน loadDataWithCache ตรงนี้ (ก่อนเริ่ม Component อื่นๆ)
      // ========================================================
      
      const loadDataWithCache = async (key, fetcher, setter) => {
        // 1. ลองดึงของเก่ามาโชว์ก่อน (Fast Load)
        const cached = localStorage.getItem(key);
        if (cached) {
            try {
                const parsed = JSON.parse(cached);
                setter(parsed);
                // console.log(`[Cache] Loaded ${key}`);
            } catch (e) {
                console.error("Cache parsing error", e);
            }
        }

        // 2. วิ่งไปโหลดของใหม่จาก Firebase (Network Fetch)
        try {
            const freshData = await fetcher();
            
            // 3. อัปเดตหน้าจอด้วยข้อมูลใหม่
            setter(freshData);
            
            // 4. บันทึกของใหม่ลงกล่อง (เก็บไว้ใช้ครั้งหน้า)
            localStorage.setItem(key, JSON.stringify(freshData));
            // console.log(`[Network] Updated ${key}`);
        } catch (err) {
            console.error(`Error fetching ${key}:`, err);
        }
      };

      // --- [NEW] 1. Components สำหรับ UX/UI ใหม่ ---

              <button onClick={onRetry} className="px-8 py-3 bg-slate-900 text-white rounded-2xl font-bold shadow-lg shadow-slate-300 hover:shadow-xl hover:-translate-y-1 transition-all active:scale-95 flex items-center gap-2">

              </button>
          </div>

      // ตัวดักจับ Error (Error Boundary)
      class ErrorBoundary extends React.Component {
          constructor(props) { super(props); this.state = { hasError: false }; }
          static getDerivedStateFromError(error) { return { hasError: true }; }
          componentDidCatch(error, errorInfo) { console.error("Critical Error:", error, errorInfo); }
          handleRetry = () => { this.setState({ hasError: false }); window.location.reload(); }
          render() {
              if (this.state.hasError) return <ErrorPage onRetry={this.handleRetry} />;
              return this.props.children;
          }
      }

      // ปุ่ม Loading อัจฉริยะ (กันกดซ้ำ)
      const LoadingButton = ({ onClick, loading, disabled, icon, children, className, variant = 'primary', type = 'button' }) => {
          // กำหนดสีปุ่มตาม variant
          let colorClass = "bg-primary-600 hover:bg-primary-700 text-white shadow-lg shadow-primary-500/30"; // primary default

          return (
              <button

                  onClick={onClick} 
                  disabled={loading || disabled}

                      <span>{children}</span>

      const Icon = React.memo(({ name, className = "" }) => {
          const elementRef = useRef(null);
          useEffect(() => {
              if (elementRef.current && window.lucide) {
                  const i = document.createElement('i');
                  i.setAttribute('data-lucide', name);
                  if (className) i.className = className;
                  elementRef.current.innerHTML = '';
                  elementRef.current.appendChild(i);
                  window.lucide.createIcons({ root: elementRef.current });
              }
          }, [name, className]);
          return <span ref={elementRef} style={{ display: 'contents' }} />;
      });

      // ✅ [Helper Function] ฟังก์ชันเรียกข้อมูลไอคอนและนามสกุนไฟล์ - ใช้ได้ทั่วไป
      const getFileIconInfo = (fileName, isLink = false) => {
          if (isLink) return { icon: 'link', color: 'text-blue-600', bg: 'bg-blue-50', label: 'Link' };
          const ext = fileName?.split('.').pop().toLowerCase() || '';
          
          // รูปภาพ
          if (['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp'].includes(ext)) 
              return { icon: 'image', color: 'text-purple-600', bg: 'bg-purple-50', label: ext.toUpperCase() };
          
          // PDF
          if (['pdf'].includes(ext)) 
              return { icon: 'file-text', color: 'text-red-600', bg: 'bg-red-50', label: 'PDF' };
          
          // Word
          if (['doc', 'docx'].includes(ext)) 
              return { icon: 'file-text', color: 'text-blue-600', bg: 'bg-blue-50', label: 'WORD' };
          
          // Excel
          if (['xls', 'xlsx'].includes(ext)) 
              return { icon: 'sheet', color: 'text-emerald-600', bg: 'bg-emerald-50', label: 'EXCEL' };
          
          // PowerPoint
          if (['ppt', 'pptx'].includes(ext)) 
              return { icon: 'layout-grid', color: 'text-orange-600', bg: 'bg-orange-50', label: 'PPTX' };
          
          // Archives
          if (['zip', 'rar', '7z'].includes(ext)) 
              return { icon: 'archive', color: 'text-amber-600', bg: 'bg-amber-50', label: 'ZIP' };
          
          // Video
          if (['mp4', 'avi', 'mov', 'mkv', 'webm'].includes(ext)) 
              return { icon: 'video', color: 'text-rose-600', bg: 'bg-rose-50', label: ext.toUpperCase() };
          
          // Audio
          if (['mp3', 'wav', 'm4a', 'aac'].includes(ext)) 
              return { icon: 'music', color: 'text-fuchsia-600', bg: 'bg-fuchsia-50', label: ext.toUpperCase() };
          
          // Code
          if (['js', 'ts', 'jsx', 'tsx', 'py', 'java', 'cpp', 'html', 'css'].includes(ext)) 
              return { icon: 'code', color: 'text-slate-700', bg: 'bg-slate-50', label: ext.toUpperCase() };
          
          // Text
          if (['txt', 'csv', 'log'].includes(ext)) 
              return { icon: 'file-type-2', color: 'text-slate-600', bg: 'bg-slate-50', label: 'TEXT' };
          
          return { icon: 'file', color: 'text-slate-600', bg: 'bg-slate-50', label: ext.toUpperCase() || 'FILE' };
      };

      const Toast = ({ message, type, onClose }) => {
          useEffect(() => { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }, [onClose]);
          return (
              <div className={`fixed top-6 right-6 z-[200] px-6 py-4 rounded-2xl shadow-glass flex items-center gap-4 animate-fade-in-up backdrop-blur-md border ${type === 'error' ? 'bg-red-50/90 border-red-200 text-red-600' : 'bg-white/90 border-emerald-100 text-emerald-600'}`}>
                  <div className={`p-2 rounded-full ${type === 'error' ? 'bg-red-100' : 'bg-emerald-100'}`}>
                      <Icon name={type === 'error' ? 'alert-circle' : 'check'} className="w-5 h-5" />
                  </div>
                  <span className="text-sm font-semibold">{message}</span>
              </div>
          );
      };

      const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel, confirmLabel = "ยืนยัน", cancelLabel = "ยกเลิก", isDangerous = false }) => {
          if (!isOpen) return null;
          return (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-backdrop animate-scale-in">
                  <div className="bg-white rounded-[2rem] w-full max-w-sm p-8 shadow-2xl text-center border border-white/20">
                      <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${isDangerous ? 'bg-red-50 text-red-500' : 'bg-primary-50 text-primary-500'}`}>
                          <Icon name={isDangerous ? "alert-triangle" : "help-circle"} className="w-8 h-8" />
                      </div>
                      <h3 className="text-xl font-bold text-dark mb-2">{title}</h3>
                      <p className="text-slate-500 mb-8 font-medium">{message}</p>
                      <div className="flex gap-3">
                          <button onClick={onCancel} className="flex-1 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-50 transition-colors active:scale-95">{cancelLabel}</button>
                          <button onClick={onConfirm} className={`flex-1 py-3 rounded-xl font-bold text-white transition-colors shadow-lg active:scale-95 ${isDangerous ? 'bg-red-500 hover:bg-red-600 shadow-red-500/20' : 'bg-primary-600 hover:bg-primary-700 shadow-primary-500/20'}`}>{confirmLabel}</button>
                      </div>
                  </div>
              </div>
          );
      };

      const PaginationControls = ({ totalItems, rowsPerPage, setRowsPerPage, currentPage, setCurrentPage }) => {
          const totalPages = Math.ceil(totalItems / rowsPerPage);
          if (totalItems === 0) return null;

          return (
              <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                  <div className="flex items-center gap-2 text-sm text-slate-500">
                      <span>แสดง</span>
                      <select 
                          value={rowsPerPage} 
                          onChange={(e) => { 
                              setRowsPerPage(Number(e.target.value)); 
                              setCurrentPage(1); 
                          }}
                          className="bg-white border border-slate-200 rounded-lg px-2 py-1 outline-none focus:ring-2 focus:ring-primary-100 font-bold text-dark cursor-pointer shadow-sm"
                      >
                          <option value={25}>25</option>
                          <option value={50}>50</option>
                          <option value={100}>100</option>
                      </select>
                      <span className="font-medium">จากทั้งหมด {totalItems} รายการ</span>
                  </div>
                  
                  <div className="flex items-center gap-2">
                      <button 
                          disabled={currentPage === 1}
                          onClick={() => {
                              setCurrentPage(prev => prev - 1);
                              document.querySelector('main > div').scrollTo({ top: 0, behavior: 'smooth' });
                          }}
                          className="p-2 rounded-xl hover:bg-white border border-transparent hover:border-slate-200 disabled:opacity-30 disabled:hover:bg-transparent text-slate-600 transition-all active:scale-90"
                      >
                          <Icon name="chevron-left" className="w-5 h-5"/>
                      </button>
                      
                      <div className="flex items-center gap-1 px-4 py-1.5 bg-white rounded-xl border border-slate-100 shadow-sm text-xs font-bold text-slate-700">
                          หน้า {currentPage} / {totalPages}
                      </div>

                      <button 
                          disabled={currentPage === totalPages}
                          onClick={() => {
                              setCurrentPage(prev => prev + 1);
                              document.querySelector('main > div').scrollTo({ top: 0, behavior: 'smooth' });
                          }}
                          className="p-2 rounded-xl hover:bg-white border border-transparent hover:border-slate-200 disabled:opacity-30 disabled:hover:bg-transparent text-slate-600 transition-all active:scale-90"
                      >
                          <Icon name="chevron-right" className="w-5 h-5"/>
                      </button>
                  </div>
              </div>
          );
      };

      // ... (คอมโพเนนต์ SkeletonLoader เดิม)

      const SkeletonLoader = () => (
          <div className="space-y-6 animate-pulse">
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                  {[1,2,3,4].map(i => <div key={i} className="h-32 bg-gray-200 rounded-3xl"></div>)}
              </div>
              <div className="h-64 bg-gray-200 rounded-3xl w-full"></div>
          </div>
      );

      const StatusBadge = React.memo(({ statusData, onClick, isAdmin }) => {
          const { status = 'red', note } = statusData || {};
          // ✅ เพิ่ม State เพื่อจำว่าเปิดข้อความอยู่หรือไม่
          const [isNoteOpen, setIsNoteOpen] = useState(false);

          const getColor = () => {
              switch(status) {
                  case 'green': return 'bg-emerald-500 text-white shadow-emerald-500/30';
                  case 'orange': return 'bg-orange-500 text-white shadow-orange-500/30';
                  case 'red': return 'bg-rose-500 text-white shadow-rose-500/30';
                  default: return 'bg-slate-300 text-slate-500';
              }
          };
          const getLabel = () => {
              switch(status) {
                  case 'green': return 'อนุมัติ';
                  case 'orange': return 'แก้ไข';
                  case 'red': return 'รอตรวจ';
                  default: return 'สถานะ';
              }
          };
          const getIcon = () => {
              switch(status) {
                  case 'green': return 'check';
                  case 'orange': return 'clock';
                  case 'red': return 'x';
                  default: return 'minus';
              }
          };

          return (
              <div className="flex items-center gap-2">
                  <button 
                      onClick={(e) => { e.stopPropagation(); onClick(); }} // กันไม่ให้ Event ทะลุ
                      disabled={!isAdmin && !note}
                      className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-bold shadow-md transition-all ${getColor()} ${isAdmin ? 'hover:scale-105 cursor-pointer active:scale-95' : (note ? 'hover:scale-105 cursor-pointer' : 'cursor-default')}`}
                      title={isAdmin ? "คลิกเพื่อเปลี่ยนสถานะ" : (note || getLabel())}
                  >
                      <Icon name={getIcon()} className="w-3 h-3" />
                      <span className="hidden sm:inline">{getLabel()}</span>
                  </button>

                  {/* ✅ ส่วนแสดงไอคอนและกล่องข้อความ (แบบ Click Toggle) */}
                  {note && (
                      <div className="relative">
                          {/* ปุ่มไอคอนสีเหลือง */}
                          <button 
                              type="button"
                              onClick={(e) => {
                                  e.stopPropagation(); // กันไม่ให้ไปกดโดน row ด้านหลัง
                                  setIsNoteOpen(!isNoteOpen); // สลับ เปิด/ปิด
                              }}
                              className={`w-6 h-6 rounded-full flex items-center justify-center shadow-sm border transition-all ${isNoteOpen ? 'bg-yellow-500 text-white border-yellow-600 scale-110 z-[10000]' : 'bg-yellow-100 text-yellow-600 border-yellow-200 hover:bg-yellow-200'}`}
                              title="คลิกเพื่ออ่านข้อความ"
                          >
                              <Icon name="message-square" className="w-3 h-3" />
                          </button>
                          
                          {/* กล่องข้อความ (แสดงเมื่อ isNoteOpen เป็น true) */}
                          {isNoteOpen && (
                              <>
                                  {/* Overlay ใสๆ เต็มจอ เพื่อให้กดที่อื่นแล้วปิดได้ */}
                                  <div className="fixed inset-0 z-[9998]" onClick={(e) => { e.stopPropagation(); setIsNoteOpen(false); }}></div>
                                  
                                  {/* ตัว Tooltip (แก้ไขแล้ว: ให้ชิดขวา) */}
                                  <div className="absolute bottom-full right-0 mb-3 w-64 p-4 bg-slate-800 text-white text-xs rounded-xl shadow-2xl z-[9999] animate-scale-in text-left origin-bottom-right">
                                      <div className="font-bold mb-2 text-yellow-400 flex items-center gap-1 border-b border-white/10 pb-2">
                                          <Icon name="message-circle" className="w-3 h-3"/> ข้อความจากผู้ตรวจ:
                                      </div>
                                      <span className="relative z-10 leading-relaxed opacity-90 whitespace-pre-line">{note}</span>
                                      
                                      {/* ลูกศรชี้ลง (แก้ไขแล้ว: ให้ชิดขวาตาม Tooltip) */}
                                      <div className="absolute top-full right-3 border-8 border-transparent border-t-slate-800"></div>
                                  </div>
                              </>
                          )}
                      </div>
                  )}
              </div>
          );
      });

      const StatusEditModal = ({ isOpen, data, onClose, onSave }) => {
          if (!isOpen) return null;
          const [localStatus, setLocalStatus] = useState(data.status || 'red');
          const [localNote, setLocalNote] = useState(data.note || '');
          return (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-backdrop animate-scale-in">
                  <div className="bg-white rounded-[2rem] w-full max-w-sm p-6 shadow-2xl relative">
                      <button onClick={onClose} className="absolute top-4 right-4 p-2 hover:bg-slate-50 rounded-full transition-colors"><Icon name="x" className="w-5 h-5 text-slate-400"/></button>
                      <h3 className="text-lg font-bold text-dark mb-4">ปรับปรุงสถานะ</h3>
                      <p className="text-sm text-slate-500 mb-6 font-medium line-clamp-2">{data.itemTitle}</p>
                      <div className="space-y-3 mb-6">
                          {['green', 'orange', 'red'].map(s => (
                              <button key={s} onClick={() => setLocalStatus(s)} className={`w-full p-4 rounded-xl flex items-center justify-between transition-all ${localStatus === s ? (s === 'green' ? 'bg-emerald-50 border-2 border-emerald-500 text-emerald-700' : s === 'orange' ? 'bg-orange-50 border-2 border-orange-500 text-orange-700' : 'bg-rose-50 border-2 border-rose-500 text-rose-700') : 'bg-slate-50 border-2 border-transparent text-slate-600 hover:bg-slate-100'}`}>
                                  <span className="font-bold flex items-center gap-2">
                                      <div className={`w-3 h-3 rounded-full ${s === 'green' ? (localStatus === s ? 'bg-emerald-500' : 'bg-emerald-200') : s === 'orange' ? (localStatus === s ? 'bg-orange-500' : 'bg-orange-200') : (localStatus === s ? 'bg-rose-500' : 'bg-rose-200')}`}></div> 
                                      {s === 'green' ? 'อนุมัติ' : s === 'orange' ? 'ปรับปรุงแก้ไข' : 'รอตรวจสอบ'}
                                  </span>
                                  {localStatus === s && <Icon name="check-circle" className={`w-5 h-5 ${s === 'green' ? 'text-emerald-500' : s === 'orange' ? 'text-orange-500' : 'text-rose-500'}`}/>}
                              </button>
                          ))}
                      </div>
                      {localStatus === 'orange' && (
                          <div className="mb-6 animate-fade-in-up">
                              <label className="text-xs font-bold text-slate-500 ml-1 mb-1 block">ข้อหมายเหตุ</label>
                              <textarea className="modern-input resize-none" rows="3" placeholder="ระบุสิ่งที่ต้องแก้ไข..." value={localNote} onChange={e => setLocalNote(e.target.value)}></textarea>
                          </div>
                      )}
                      <button onClick={() => onSave(localStatus, localNote)} className="w-full py-3 bg-dark text-white rounded-xl font-bold hover:bg-black transition-all shadow-lg active:scale-95">บันทึก</button>
                  </div>
              </div>
          );
      };

      // --- File Card Component (แก้ไข: แสดง Preview ตลอดเวลา + เพิ่มไอคอนนามสกุลไฟล์) ---
      const FileCard = React.memo(({ file, user, isAdmin, onDelete, onRename, onPreviewModal, stdTheme, allowMaximize = true, onDownload, isLocked }) => {
          const isOwner = user && file.uploader === user.uid;
          const canManage = isAdmin || (isOwner && !isLocked);

          const getEmbedUrl = (url) => { if (!url) return ''; try { let previewUrl = url; if (url.includes('/view')) previewUrl = url.replace('/view', '/preview'); else if (url.includes('open?id=')) previewUrl = `https://drive.google.com/file/d/${url.split('id=')[1]}/preview`; return previewUrl; } catch (e) { return url; } };
          
          // ✅ ใช้ helper function ที่เป็น global
          const iconInfo = getFileIconInfo(file.fileName, file.isLink);
          
          const handleOpen = () => { if (onDownload) onDownload(file, file.isLink ? 'Open Link' : 'Open/Preview'); window.open(file.fileUrl, '_blank'); };
          const handlePreview = () => onPreviewModal(file);
          const handleRename = () => onRename(file);
          const handleDelete = () => onDelete(file);

          return (
              <div className={`card-modern p-5 flex flex-col gap-4 group hover:border-opacity-50 transition-all h-full ${stdTheme.border ? stdTheme.border.replace('border-', 'hover:border-') : 'hover:border-primary-200'}`}>
                  {/* Layout แนวตั้งเพื่อให้ข้อความไม่บีบ */}
                  <div className="flex flex-col items-center gap-3 text-center">
                      
                      {/* Icon + Extension Badge */}
                      <div className="relative">
                          <div className={`w-14 h-14 rounded-2xl ${iconInfo.bg} flex items-center justify-center ${iconInfo.color} shrink-0 shadow-sm`}>
                              <Icon name={iconInfo.icon} className="w-7 h-7"/>
                          </div>
                          {/* ✅ [เพิ่มใหม่] Extension Badge - badge สำหรับแสดงนามสกุลไฟล์ */}
                          {iconInfo.label && (
                              <div className={`absolute -bottom-1 -right-1 ${iconInfo.bg} ${iconInfo.color} text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-current border-opacity-20 shadow-md`}>
                                  {iconInfo.label}
                              </div>
                          )}
                      </div>

                      {/* Text Content */}
                      <div className="flex-1 w-full min-w-0 flex flex-col justify-center">
                          <h4 onClick={handleOpen} className={`font-bold text-dark text-sm md:text-base break-words leading-snug transition-colors cursor-pointer hover:underline mb-1 ${stdTheme.text_hover}`}>
                              {file.fileName || file.title}
                          </h4>
                          
                          <div className="flex flex-wrap items-center justify-center gap-x-3 gap-y-1 text-xs text-slate-400">
                             <span><Icon name="user" className="w-3 h-3 inline mr-1"/> {file.uploaderName?.split(' ')[0] || 'User'}</span>
                             <span className="font-display opacity-70"><Icon name="calendar" className="w-3 h-3 inline mr-1"/> {file.createdAt?.seconds ? new Date(file.createdAt.seconds * 1000).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' }) : '-'}</span>
                          </div>
                      </div>

                      {/* Buttons */}
                      <div className="flex gap-2 mt-1">
                          <TooltipBtn onClick={handleOpen} icon="external-link" colorClass={`bg-slate-50 text-slate-500 hover:bg-opacity-50 ${stdTheme.bg_hover.replace('bg-', 'hover:text-').replace('600', '600').replace('hover:bg-', 'hover:bg-opacity-10 ' + stdTheme.bg_hover.split(' ')[0])}`} tooltipText="เปิดลิงก์"/>
                          {allowMaximize && !file.isLink && <TooltipBtn onClick={handlePreview} icon="maximize-2" colorClass="bg-slate-50 text-slate-500 hover:bg-slate-100" tooltipText="ขยายเต็มจอ"/>}
                          {canManage && (
                              <>
                                  <TooltipBtn onClick={handleRename} icon="pencil" colorClass="bg-slate-50 text-slate-500 hover:bg-yellow-50 hover:text-yellow-600" tooltipText="เปลี่ยนชื่อ"/>
                                  <TooltipBtn onClick={handleDelete} icon="trash-2" colorClass="bg-slate-50 text-slate-500 hover:bg-red-50 hover:text-red-600" tooltipText="ลบ"/>
                              </>
                          )}
                      </div>
                  </div>

                  {/* ✅ จุดที่แก้ไข: ลบ 'hidden group-hover:block' ออก 
                      เพื่อให้แสดงผลตลอดเวลา และปรับความสูง h-[...] ตามต้องการ (เช่น h-[300px]) 
                  */}
                  {!file.isLink && (
                      <div className="mt-auto border-t border-slate-100 pt-3 block transition-all animate-fade-in-up">
                          <div className="bg-slate-50 rounded-xl overflow-hidden h-[600px] border border-slate-200">
                              <iframe src={getEmbedUrl(file.fileUrl)} className="w-full h-full border-none" allow="autoplay" loading="lazy"></iframe>
                          </div>
                      </div>
                  )}

                  {/* Link Preview */}
                  {file.isLink && (
                      <div className="mt-auto border-t border-slate-100 pt-3 block transition-all animate-fade-in-up">
                           <div onClick={handleOpen} className="bg-slate-50 rounded-xl h-[80px] border border-slate-200 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-100 transition-colors group/link">
                               <Icon name="link" className="w-6 h-6 text-slate-300 group-hover/link:text-primary-500 mb-1 transition-colors"/>
                               <span className="text-[10px] text-slate-400 group-hover/link:text-primary-600 truncate max-w-[80%]">คลิกเพื่อเปิดลิงก์</span>
                           </div>
                      </div>
                  )}
              </div>
          );
      }, (prev, next) => {
          const basicCheck = prev.file.id === next.file.id && prev.stdTheme === next.stdTheme && prev.isAdmin === next.isAdmin && prev.allowMaximize === next.allowMaximize && prev.isLocked === next.isLocked;
          const titleCheck = prev.file.title === next.file.title && prev.file.fileName === next.file.fileName;
          return basicCheck && titleCheck;
      });
      
     const CustomAlert = ({ isOpen, title, message, onClose }) => {
        if (!isOpen) return null;
        return (
          <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 animate-scale-in">
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
            <div className="relative w-full max-w-sm bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-2xl z-10">
              <div className="text-center">
                <div className="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-900/50 mb-4">
                  <Icon name="alert-triangle" className="h-6 w-6 text-red-500" />
                </div>
                <h3 className="text-lg font-bold text-white mb-2">{title}</h3>
                <p className="text-sm text-slate-300 whitespace-pre-line leading-relaxed mb-6">{message}</p>
                <button type="button" onClick={onClose} className="w-full rounded-xl bg-red-600 px-4 py-3 text-white font-bold hover:bg-red-700 transition-all active:scale-95">เข้าใจแล้ว</button>
              </div>
            </div>
          </div>
        );
      };

      const UserChatWidget = ({ user, showToast }) => {
          const [isOpen, setIsOpen] = useState(false);
          const [messages, setMessages] = useState([]);
          const [input, setInput] = useState('');
          const chatEndRef = useRef(null);

          useEffect(() => {
              if (!isOpen || !user) return;
              const unsubscribe = db.collection('chats').doc(user.uid).collection('messages')
                  .orderBy('createdAt', 'asc')
                  .onSnapshot(snap => {
                      const msgs = snap.docs.map(d => ({id:d.id, ...d.data()}));
                      setMessages(msgs);
                  });
              return () => unsubscribe();
          }, [isOpen, user]);

          useEffect(() => { 
              if(isOpen && chatEndRef.current) {
                  // หน่วงเวลาเล็กน้อยเพื่อให้ Keyboard เด้งขึ้นมาแล้วค่อยเลื่อน
                  setTimeout(() => {
                      chatEndRef.current.scrollIntoView({ behavior: "smooth" });
                  }, 100);
              }
          }, [messages, isOpen]);

          // --- [Updated] handleSend with Auto-Reply Logic ---
          const handleSend = async (e) => {
              e.preventDefault();
              if(!input.trim()) return;
              
              const userMessage = input; 
              setInput(''); // Clear input immediately

              try {
                  // 1. Send User Message
                  await db.collection('chats').doc(user.uid).collection('messages').add({
                      text: userMessage,
                      sender: 'user',
                      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                      read: false
                  });
                  
                  await db.collection('chats').doc(user.uid).set({
                      lastMessage: userMessage,
                      lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                      userId: user.uid,
                      userName: user.displayName || user.email,
                      userPhoto: user.photoURL,
                      hasUnread: true
                  }, {merge: true});

                  // 2. Check Auto-Reply
                  const configDoc = await db.collection('system_settings').doc('chat_config').get();
                  if (configDoc.exists) {
                      const conf = configDoc.data();
                      if (conf.enabled) {
                          let shouldReply = false;
                          if (conf.useTime) {
                              const now = new Date();
                              const currentMinutes = now.getHours() * 60 + now.getMinutes();
                              
                              const [startH, startM] = conf.startTime.split(':').map(Number);
                              const [endH, endM] = conf.endTime.split(':').map(Number);
                              const startMinutes = startH * 60 + startM;
                              const endMinutes = endH * 60 + endM;

                              // Logic check interval
                              if (startMinutes > endMinutes) {
                                  // Cross midnight (e.g. 22:00 - 08:00)
                                  if (currentMinutes >= startMinutes || currentMinutes <= endMinutes) shouldReply = true;
                              } else {
                                  // Same day (e.g. 08:00 - 17:00 -> reply ONLY if OUTSIDE this range?)
                                  // Wait, "startTime" usually means "Away Start Time".
                                  // Let's assume User sets "Away From 16:30 To 08:30" (Start Away -> End Away)
                                  if (currentMinutes >= startMinutes && currentMinutes <= endMinutes) shouldReply = true;
                              }
                              
                              // Weekend check (Sat=6, Sun=0)
                              const day = now.getDay();
                              if (day === 0 || day === 6) shouldReply = true;
                          } else {
                              shouldReply = true; // Always on
                          }

                          // Check last message to prevent spam (Reply only if last msg wasn't auto-reply)

// --- [NEW] Component ตั้งค่า Auto Reply ---
      // --- [UPDATED] Component ตั้งค่า Auto Reply & Canned Responses ---
      const ChatSettingsModal = ({ isOpen, onClose, db, showToast }) => {
          // ค่า Default เดิม
          const DEFAULT_CANNED = [
              "สวัสดีครับ มีอะไรให้ทีมงานช่วยดูแลครับ?",
              "รบกวนขอทราบรหัสประจำตัวผู้ใช้งาน หรือชื่อ-นามสกุล ด้วยครับ",
              "ขณะนี้เจ้าหน้าที่ได้รับเรื่องแล้ว จะรีบดำเนินการตรวจสอบให้ครับ",
              "ขอบคุณครับ"
          ];

          const [config, setConfig] = useState({
              enabled: false,
              useTime: true,
              startTime: "16:30",
              endTime: "08:30",
              message: "ขณะนี้อยู่นอกเวลาทำการ เจ้าหน้าที่จะรีบตอบกลับในวันรุ่งขึ้นครับ",
              cannedMessages: DEFAULT_CANNED // เพิ่ม field นี้
          });
          
          const [newCannedMsg, setNewCannedMsg] = useState(""); // State สำหรับช่องพิมพ์ข้อความใหม่
          const [loading, setLoading] = useState(false);

          useEffect(() => {
              if (!isOpen) return;
              db.collection('system_settings').doc('chat_config').get().then(doc => {
                  if (doc.exists) {
                      const data = doc.data();
                      // Merge ข้อมูลเดิมเข้ากับ Default เพื่อป้องกัน Error กรณี field ยังไม่ถูกสร้าง
                      setConfig(prev => ({ 
                          ...prev, 
                          ...data,
                          cannedMessages: data.cannedMessages || DEFAULT_CANNED
                      }));
                  }
              });
          }, [isOpen]);

          const handleSave = async () => {
              setLoading(true);
              try {
                  await db.collection('system_settings').doc('chat_config').set(config, { merge: true });
                  showToast("บันทึกการตั้งค่าเรียบร้อยแล้ว");
                  onClose();
              } catch (err) {
                  showToast("บันทึกไม่สำเร็จ", "error");
              }
              setLoading(false);
          };

          // ฟังก์ชันเพิ่มข้อความ
          const handleAddCanned = (e) => {
              e.preventDefault();
              if (!newCannedMsg.trim()) return;
              setConfig(prev => ({
                  ...prev,
                  cannedMessages: [...prev.cannedMessages, newCannedMsg.trim()]
              }));
              setNewCannedMsg("");
          };

          // ฟังก์ชันลบข้อความ
          const handleRemoveCanned = (index) => {
              setConfig(prev => ({
                  ...prev,
                  cannedMessages: prev.cannedMessages.filter((_, i) => i !== index)
              }));
          };

          if (!isOpen) return null;

          return (
              <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 modal-backdrop animate-scale-in">
                  <div className="bg-white rounded-[2rem] w-full max-w-md p-6 shadow-2xl border border-white/20 flex flex-col max-h-[90vh]">
                      <div className="flex justify-between items-center mb-4 shrink-0">
                          <h3 className="font-bold text-lg text-dark flex items-center gap-2">
                              <Icon name="settings" className="w-5 h-5 text-primary-500" /> ตั้งค่าแชท
                          </h3>
                          <button onClick={onClose} className="p-2 hover:bg-slate-50 rounded-full"><Icon name="x" className="w-5 h-5 text-slate-400"/></button>
                      </div>
                      
                      <div className="space-y-6 overflow-y-auto custom-scrollbar flex-1 pr-2">
                          
                          {/* ส่วนที่ 1: Auto Reply */}

                                      <div className="w-9 h-5 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary-500"></div>
                                  </label>
                              </div>

                              <div className={`space-y-3 transition-opacity ${!config.enabled ? 'opacity-50 pointer-events-none' : ''}`}>
                                  <label className="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                                      <input type="checkbox" checked={config.useTime} onChange={e => setConfig({...config, useTime: e.target.checked})} className="rounded text-primary-600 focus:ring-primary-500"/>
                                      <span>กำหนดช่วงเวลา (นอกเวลานี้จะตอบกลับ)</span>
                                  </label>
                                  
                                  {config.useTime && (
                                      <div className="flex items-center gap-2 text-sm bg-slate-50 p-2 rounded-lg border border-slate-100">
                                          <input type="time" value={config.startTime} onChange={e => setConfig({...config, startTime: e.target.value})} className="bg-white border border-slate-200 rounded px-1 text-slate-600 outline-none focus:border-primary-300" />
                                          <span className="text-slate-400 text-xs">ถึง</span>
                                          <input type="time" value={config.endTime} onChange={e => setConfig({...config, endTime: e.target.value})} className="bg-white border border-slate-200 rounded px-1 text-slate-600 outline-none focus:border-primary-300" />
                                      </div>
                                  )}

                                  <div>
                                      <label className="text-xs font-bold text-slate-500 mb-1 block ml-1">ข้อความตอบกลับ</label>
                                      <textarea 
                                          className="modern-input text-sm" 
                                          rows="2" 
                                          value={config.message}
                                          onChange={e => setConfig({...config, message: e.target.value})}
                                      ></textarea>
                                  </div>
                              </div>
                          </div>

                          {/* ส่วนที่ 2: ข้อความสำเร็จรูป (Canned Responses) */}
                          <div className="space-y-4">
                              <div className="flex items-center gap-2 mb-2">
                                  <div className="w-8 h-8 rounded-lg bg-orange-50 text-orange-600 flex items-center justify-center"><Icon name="message-square" className="w-4 h-4"/></div>
                                  <span className="font-bold text-slate-700">ข้อความสำเร็จรูป (Quick Reply)</span>
                              </div>

                              {/* List รายการ */}
                              <div className="bg-slate-50 rounded-xl border border-slate-100 overflow-hidden">
                                  {config.cannedMessages.length > 0 ? (
                                      <ul className="divide-y divide-slate-200">
                                          {config.cannedMessages.map((msg, idx) => (
                                              <li key={idx} className="flex justify-between items-center p-3 text-sm group hover:bg-white transition-colors">
                                                  <span className="text-slate-600 truncate mr-2">{msg}</span>
                                                  <button 
                                                      onClick={() => handleRemoveCanned(idx)}
                                                      className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-1"
                                                      title="ลบ"
                                                  >
                                                      <Icon name="trash-2" className="w-4 h-4"/>
                                                  </button>
                                              </li>
                                          ))}
                                      </ul>
                                  ) : (
                                      <div className="p-4 text-center text-xs text-slate-400">ไม่มีข้อความสำเร็จรูป</div>
                                  )}
                              </div>

                              {/* ช่องเพิ่มข้อความใหม่ */}
                              <form onSubmit={handleAddCanned} className="flex gap-2">
                                  <input 
                                      type="text" 
                                      className="flex-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-primary-100"
                                      placeholder="พิมพ์ข้อความใหม่..."
                                      value={newCannedMsg}
                                      onChange={e => setNewCannedMsg(e.target.value)}
                                  />
                                  <button type="submit" disabled={!newCannedMsg.trim()} className="bg-slate-800 text-white p-2 rounded-xl hover:bg-black disabled:opacity-50 transition-colors">
                                      <Icon name="plus" className="w-5 h-5"/>
                                  </button>
                              </form>
                          </div>

                      </div>

                      <div className="mt-6 pt-4 border-t border-slate-100 shrink-0">
                          <button onClick={handleSave} disabled={loading} className="w-full py-3 bg-dark text-white rounded-xl font-bold hover:bg-black transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">
                              {loading ? <Icon name="loader" className="w-5 h-5 animate-spin"/> : <Icon name="save" className="w-5 h-5"/>}
                              <span>บันทึกการตั้งค่า</span>

                  </div>
              </div>
          );
      };
      
      
      const AdminChatDashboard = ({ user, showToast }) => {

          const scrollRef = useRef(null);
          
          // --- ส่วนที่เพิ่มใหม่ (Settings & Canned Responses) ---
          const [showChatSettings, setShowChatSettings] = useState(false);
          const [showCannedMenu, setShowCannedMenu] = useState(false);
          
          // 1. สร้าง State สำหรับเก็บข้อความ (ค่าเริ่มต้น)
          const [cannedResponses, setCannedResponses] = useState([
              "สวัสดีครับ มีอะไรให้ทีมงานช่วยดูแลครับ?",
              "รบกวนขอทราบรหัสประจำตัวผู้ใช้งาน หรือชื่อ-นามสกุล ด้วยครับ",
              "ขณะนี้เจ้าหน้าที่ได้รับเรื่องแล้ว จะรีบดำเนินการตรวจสอบให้ครับ",
              "ขอบคุณครับ"
          ]);

          // 2. ดึงข้อมูลข้อความจาก Database (Realtime)
          useEffect(() => {
              const unsubscribe = db.collection('system_settings').doc('chat_config')
                  .onSnapshot(doc => {
                      if (doc.exists) {
                          const data = doc.data();
                          if (data.cannedMessages && Array.isArray(data.cannedMessages)) {
                              setCannedResponses(data.cannedMessages);
                          }
                      }
                  });
              return () => unsubscribe();
          }, []);
          // --------------------------------------------------

          // โหลดรายชื่อแชท
          useEffect(() => {
              const unsubscribe = db.collection('chats').orderBy('lastUpdated', 'desc').onSnapshot(snap => {
                  const chats = snap.docs.map(d => ({id: d.id, ...d.data()}));
                  setChatList(chats);
              });
              return () => unsubscribe();
          }, []);

          // โหลดข้อความในแชทที่เลือก
          useEffect(() => {
              if(!selectedChat) return;
              const unsubscribe = db.collection('chats').doc(selectedChat.id).collection('messages').orderBy('createdAt', 'asc')
                  .onSnapshot(snap => {
                      setMessages(snap.docs.map(d => ({id:d.id, ...d.data()})));
                      if(selectedChat.hasUnread) {
                          db.collection('chats').doc(selectedChat.id).update({hasUnread: false});
                      }
                  });
              return () => unsubscribe();
          }, [selectedChat]);

          // เลื่อนจอลงล่างสุดเสมอเมื่อมีข้อความใหม่
          useEffect(() => {
              if (scrollRef.current) {
                  const scrollContainer = scrollRef.current;
                  scrollContainer.scrollTop = scrollContainer.scrollHeight;
              }
          }, [messages, selectedChat]);

          // ฟังก์ชันส่งข้อความ
          const handleSend = async (e) => {
              e.preventDefault();
              if(!input.trim() || !selectedChat) return;
              try {
                  await db.collection('chats').doc(selectedChat.id).collection('messages').add({
                      text: input,
                      sender: 'admin',
                      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                      read: false
                  });
                  await db.collection('chats').doc(selectedChat.id).update({
                      lastMessage: input,
                      lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                  });
                  setInput('');
              } catch(err) { showToast("ส่งข้อความไม่สำเร็จ", "error"); }
          };

              e.stopPropagation(); 
              if (!confirm(`ยืนยันการลบห้องแชทของคุณ "${chatName}"?`)) return;
              try {
                  await db.collection('chats').doc(chatId).delete();
                  if (selectedChat?.id === chatId) setSelectedChat(null);
                  showToast("ลบห้องแชทเรียบร้อยแล้ว");

                  showToast("ลบไม่สำเร็จ", "error");

                                      <div className="w-10 h-10 rounded-full bg-slate-200 overflow-hidden shrink-0 relative">

                                          <div className={`font-bold text-sm truncate ${selectedChat?.id === chat.id ? 'text-primary-700' : 'text-slate-700'}`}>{chat.userName}</div>

                                          title="ลบแชทนี้"
                                      >
                                          <Icon name="trash-2" className="w-4 h-4"/>

                          {/* Header */}
                          <div className="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center shrink-0 pt-safe-top">

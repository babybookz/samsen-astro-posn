                                      <Icon name="arrow-left" className="w-6 h-6"/>
                                  </button>
                                  
                                  <div className="w-10 h-10 rounded-full bg-slate-200 overflow-hidden shrink-0">
                                      {selectedChat.userPhoto ? <img src={selectedChat.userPhoto} className="w-full h-full object-cover"/> : <div className="w-full h-full flex items-center justify-center font-bold text-slate-500">{selectedChat.userName?.[0]}</div>}
                                  </div>
                                  <div className="min-w-0">
                                      <div className="font-bold text-dark truncate max-w-[200px]">{selectedChat.userName}</div>
                                      <div className="text-xs text-slate-400 truncate">ID: {selectedChat.userId}</div>
                                  </div>
                              </div>
                          </div>

                          {/* Chat Messages */}
                          <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 bg-slate-50/30 custom-scrollbar scroll-smooth">
                              {messages.map(m => (
                                  <div key={m.id} className={`flex ${m.sender === 'admin' ? 'justify-end' : 'justify-start'}`}>
                                      <div className={`max-w-[85%] px-4 py-3 text-sm leading-relaxed shadow-sm break-words ${
                                          m.sender === 'admin' && !m.isAutoReply
                                          ? 'bg-gradient-to-br from-primary-600 to-primary-500 text-white rounded-l-2xl rounded-tr-2xl rounded-br-sm' 
                                          : m.isAutoReply 
                                              ? 'bg-slate-100 text-slate-500 border border-slate-200 rounded-l-2xl rounded-tr-2xl rounded-br-sm italic flex items-center gap-2'
                                              : 'bg-white text-slate-700 border border-slate-100 rounded-r-2xl rounded-tl-2xl rounded-bl-sm'
                                      }`}>
                                          {m.isAutoReply && <Icon name="bot" className="w-4 h-4"/>}
                                          {m.text}
                                      </div>
                                  </div>
                              ))}
                          </div>

                          {/* Input Area */}
                          <form onSubmit={handleSend} className="p-3 md:p-4 bg-white border-t border-slate-100 flex gap-2 md:gap-3 shrink-0 pb-safe-bottom relative">
                              
                              {/* Canned Responses Button & Menu */}
                              <div className="relative">
                                  <button 
                                      type="button" 
                                      onClick={() => setShowCannedMenu(!showCannedMenu)}
                                      className={`p-3 rounded-2xl transition-colors ${showCannedMenu ? 'bg-primary-50 text-primary-600' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                                      title="ข้อความสำเร็จรูป"
                                  >
                                      <Icon name="zap" className="w-5 h-5" />
                                  </button>

                                  {/* Popover Menu */}
                                  {showCannedMenu && (
                                      <>
                                          <div className="fixed inset-0 z-10" onClick={() => setShowCannedMenu(false)}></div>
                                          <div className="absolute bottom-full left-0 mb-3 w-72 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden z-20 animate-scale-in origin-bottom-left">
                                              <div className="p-3 bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 uppercase tracking-wider flex justify-between items-center">
                                                  <span>เลือกคำตอบด่วน</span>
                                                  {/* ปุ่มลัดไปหน้าแก้ไข */}
                                                  <button onClick={() => { setShowCannedMenu(false); setShowChatSettings(true); }} className="text-primary-600 hover:underline text-[10px]">แก้ไขรายการ</button>
                                              </div>
                                              <div className="max-h-64 overflow-y-auto custom-scrollbar p-1">
                                                  {/* 3. ใช้ตัวแปร cannedResponses ที่ดึงมาจาก DB */}
                                                  {cannedResponses.map((text, i) => (
                                                      <button
                                                          key={i}
                                                          type="button"
                                                          onClick={() => {
                                                              setInput(text);
                                                              setShowCannedMenu(false);
                                                          }}
                                                          className="w-full text-left p-3 hover:bg-primary-50 rounded-xl text-sm text-slate-700 hover:text-primary-700 transition-colors flex items-start gap-2"
                                                      >
                                                          <Icon name="message-square" className="w-4 h-4 mt-0.5 shrink-0 opacity-50"/>
                                                          <span className="leading-snug">{text}</span>
                                                      </button>
                                                  ))}
                                                  {cannedResponses.length === 0 && (
                                                      <div className="p-4 text-center text-slate-400 text-xs">ยังไม่มีข้อความ (กดแก้ไขเพื่อเพิ่ม)</div>
                                                  )}
                                              </div>
                                          </div>
                                      </>
                                  )}
                              </div>

                              <input 
                                  className="flex-1 bg-slate-50 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-primary-100 transition-all text-base" 
                                  placeholder="ตอบกลับ..." 
                                  value={input} 
                                  onChange={e => setInput(e.target.value)} 
                                  autoComplete="off"
                              />
                              
                              <button type="submit" className="p-3 md:px-6 md:py-3 bg-primary-600 text-white rounded-2xl font-bold hover:bg-primary-700 transition-colors shadow-lg shadow-primary-500/20 shrink-0">
                                  <Icon name="send" className="w-5 h-5 md:hidden" />
                                  <span className="hidden md:inline">ส่ง</span>
                              </button>
                          </form>
                      </div>
                  ) : (
                      <div className="hidden md:flex flex-1 bg-white rounded-[2rem] border border-slate-100 shadow-sm items-center justify-center text-slate-400 flex-col gap-4">
                          <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center"><Icon name="message-circle" className="w-10 h-10 text-slate-300"/></div>
                          <p>เลือกรายการแชททางซ้ายมือ</p>
                      </div>
                  )}

                  {/* Modal Setting */}
                  <ChatSettingsModal isOpen={showChatSettings} onClose={() => setShowChatSettings(false)} db={db} showToast={showToast} />
              </div>
          );
      };

      // --- Helper for Audit Logs ---
      const logSystemActivity = async (db, user, action, details) => {
          if (!user) return;
          try {
              await db.collection('audit_logs').add({
                  action: action,
                  details: details,
                  performedBy: user.uid,
                  performedByName: user.displayName || user.email,
                  performedByPhoto: user.photoURL || null, // เพิ่มการบันทึกรูป
                  timestamp: firebase.firestore.FieldValue.serverTimestamp()
              });
          } catch (err) {
              console.error("Log failed", err);
          }
      };
      
      // --- New Component: Deadline Manager (จัดการเวลาเปิด-ปิด) ---
      // --- New Component: Deadline Manager (สำหรับ SuperAdmin ตั้งเวลา) ---
      // --- New Component: Deadline Manager (สำหรับ SuperAdmin ตั้งเวลา) ---
      const DeadlineManager = ({ year, standards, users, showToast, db, user }) => {
          const [periods, setPeriods] = useState({});
          const [loading, setLoading] = useState(false);
          const [exceptionModal, setExceptionModal] = useState({ show: false, periodId: null, docId: null });
          const [selectedUser, setSelectedUser] = useState('');
          const [unlockHours, setUnlockHours] = useState(24);

          // Fetch Data
          useEffect(() => {
              if(!year) return;
              const unsub = db.collection('submission_periods').where('year', '==', year)
                  .onSnapshot(snap => {
                      const map = {};
                      snap.docs.forEach(d => map[d.data().targetId] = { id: d.id, ...d.data() });
                      setPeriods(map);
                  });
              return () => unsub();
          }, [year]);

          // Save Date Range & Status
          const handleSavePeriod = async (targetId, start, end, isActive) => {
              setLoading(true);
              try {
                  const data = {
                      year: year,
                      targetId: targetId,
                      startDate: start ? firebase.firestore.Timestamp.fromDate(new Date(start)) : null,
                      endDate: end ? firebase.firestore.Timestamp.fromDate(new Date(end)) : null,
                      isActive: isActive, 
                      updatedBy: user.uid,
                      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                  };
                  const existing = periods[targetId];
                  if (existing) {
                      await db.collection('submission_periods').doc(existing.id).update(data);
                  } else {
                      await db.collection('submission_periods').add({ ...data, exceptions: {} });
                  }
                  logSystemActivity(db, user, 'Deadline Control', `${isActive ? 'เปิด' : 'ปิด'}ระบบรับงาน: ${targetId === 'GLOBAL' ? 'รวมทั้งโรงเรียน' : targetId}`);

                  showToast(`บันทึกข้อมูลเรียบร้อย (${targetId === 'GLOBAL' ? 'ทั้งระบบ' : targetId})`);
              } catch (err) { console.error(err); showToast("บันทึกไม่สำเร็จ", "error"); }
              setLoading(false);
          };

          // ... (Exception Handlers คงเดิม)
          const handleAddException = async () => { 
               if(!selectedUser || !exceptionModal.docId) return;
               const expiry = new Date();
               expiry.setHours(expiry.getHours() + unlockHours);
               
               await db.collection('submission_periods').doc(exceptionModal.docId).update({
                   [`exceptions.${selectedUser}`]: firebase.firestore.Timestamp.fromDate(expiry)
               });
               
               // หาชื่อผู้ใช้จาก ID
                const targetUser = users.find(u => u.id === selectedUser);
                const targetName = targetUser ? (targetUser.displayName || targetUser.email) : selectedUser;

                // บันทึก Log โดยใช้ชื่อ
                await logSystemActivity(db, user, 'Unlock Exception', `ปลดล็อกพิเศษให้ ${targetName} เป็นเวลา ${unlockHours} ชม.`);
               setExceptionModal({ show: false, periodId: null, docId: null });
               setSelectedUser('');
               showToast('เพิ่มสิทธิ์พิเศษเรียบร้อย');
          };

          const handleRemoveException = async (docId, userId) => {
               if(!confirm('ต้องการยกเลิกสิทธิ์พิเศษนี้?')) return;
               
               // 1. ค้นหาชื่อผู้ใช้จาก ID เพื่อเอาไปบันทึก Log
               const targetUser = users.find(u => u.id === userId);
               const targetName = targetUser ? (targetUser.displayName || targetUser.email) : userId;

               // 2. ลบสิทธิ์ในฐานข้อมูล
               await db.collection('submission_periods').doc(docId).update({
                   [`exceptions.${userId}`]: firebase.firestore.FieldValue.delete()
               });
               
               // 3. บันทึก Log โดยระบุชื่อคนที่ถูกยกเลิก
               logSystemActivity(db, user, 'Unlock Exception', `ยกเลิกสิทธิ์พิเศษของ: ${targetName}`);
               showToast('ยกเลิกสิทธิ์เรียบร้อย');
          };

          // ✅ 1. เช็คสถานะ Global ว่าปิดอยู่หรือไม่
          const globalRule = periods['GLOBAL'];
          const isGlobalClosed = globalRule && globalRule.isActive === false;

          const PeriodRow = ({ title, id }) => {
              const p = periods[id] || { isActive: true }; 
              
              // ตรวจสอบว่าแถวนี้ต้องโดนล็อกหรือไม่ (ถ้า Global ปิด และไม่ใช่แถว Global เอง)
              const isLockedByGlobal = id !== 'GLOBAL' && isGlobalClosed;

              const toInputVal = (ts) => {
                  if(!ts) return '';
                  const d = ts.toDate();
                  const pad = (n) => n < 10 ? '0'+n : n;
                  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
              };
              
              const exceptions = p.exceptions || {};
              const activeExceptions = Object.keys(exceptions).filter(uid => exceptions[uid].toDate() > new Date());
              
              const [localActive, setLocalActive] = useState(p.isActive !== false); 

              useEffect(() => { setLocalActive(p.isActive !== false); }, [p.isActive]);

              return (
                  <div className={`p-4 md:p-5 rounded-2xl border shadow-sm mb-4 animate-fade-in-up transition-all relative ${localActive ? 'bg-white border-slate-100' : 'bg-slate-50 border-slate-200'} ${isLockedByGlobal ? 'opacity-60 grayscale' : ''}`}>
                      
                      {/* Overlay ป้องกันการกดเมื่อโดนล็อกโดย Global */}
                      {isLockedByGlobal && (
                          <div className="absolute inset-0 z-10 bg-slate-100/50 cursor-not-allowed flex items-center justify-center rounded-2xl">
                               <div className="bg-red-500 text-white px-3 py-1 rounded-lg text-xs font-bold shadow-md flex items-center gap-2">
                                   <Icon name="lock" className="w-3 h-3"/> ปิดโดยคำสั่งรวม (Global)
                               </div>
                          </div>
                      )}

                      {/* 👇 แก้ไขการจัด Layout ตรงนี้ (flex-col บนมือถือ / lg:flex-row บนจอใหญ่) 👇 */}
                      <div className="flex flex-col lg:flex-row justify-between lg:items-center gap-4 mb-4">
                          
                          {/* 1. ชื่อมาตรฐาน */}
                          <div className="font-bold text-slate-700 w-full lg:w-1/4 flex items-start lg:items-center gap-2">
                              <div className={`w-2 h-2 rounded-full shrink-0 mt-2 lg:mt-0 ${id === 'GLOBAL' ? 'bg-red-500' : 'bg-primary-500'}`}></div> 
                              <span className="leading-snug">{title}</span>
                          </div>
                          
                          {/* 2. ส่วนควบคุม (สวิตช์ + วันที่) */}
                          <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4 flex-1 w-full">
                              
                              {/* Toggle Switch */}
                              <div className="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-xl shrink-0 w-full sm:w-auto justify-between sm:justify-start">
                                  <span className={`text-xs font-bold ${localActive && !isLockedByGlobal ? 'text-emerald-600' : 'text-slate-400'}`}>
                                      {isLockedByGlobal ? 'ปิดรับงาน' : (localActive ? 'เปิดรับงาน' : 'ปิดรับงาน')}
                                  </span>
                                  <label className="relative inline-flex items-center cursor-pointer">
                                      <input type="checkbox" checked={isLockedByGlobal ? false : localActive} onChange={(e) => setLocalActive(e.target.checked)} className="sr-only peer" disabled={isLockedByGlobal}/>
                                      <div className="w-9 h-5 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                                  </label>
                              </div>

                              {/* วันที่เริ่ม-สิ้นสุด */}
                              <div className={`flex flex-col sm:flex-row items-start sm:items-center gap-2 flex-1 w-full transition-opacity ${(!localActive || isLockedByGlobal) ? 'opacity-40 pointer-events-none' : ''}`}>
                                  <div className="flex-1 w-full">
                                      <label className="text-[10px] text-slate-400 font-bold ml-1">เริ่มเปิดระบบ</label>
                                      <input type="datetime-local" className="modern-input text-xs w-full" defaultValue={toInputVal(p.startDate)} id={`start-${id}`} disabled={isLockedByGlobal} />
                                  </div>
                                  <span className="text-slate-300 mt-5 hidden sm:block">-</span>
                                  <div className="flex-1 w-full">
                                      <label className="text-[10px] text-slate-400 font-bold ml-1">ปิดระบบ (Deadline)</label>
                                      <input type="datetime-local" className="modern-input text-xs w-full text-red-600" defaultValue={toInputVal(p.endDate)} id={`end-${id}`} disabled={isLockedByGlobal} />
                                  </div>
                              </div>
                          </div>

                          {/* 3. ปุ่มบันทึก */}
                          <div className="relative z-20 w-full lg:w-auto mt-2 lg:mt-0"> 
                              <button 
                                  onClick={() => handleSavePeriod(id, document.getElementById(`start-${id}`).value, document.getElementById(`end-${id}`).value, localActive)} 
                                  disabled={isLockedByGlobal}
                                  className={`w-full lg:w-auto px-6 py-3 lg:py-2.5 rounded-xl text-sm font-bold shadow-lg transition-all flex items-center justify-center gap-2 ${isLockedByGlobal ? 'bg-slate-300 text-white cursor-not-allowed' : 'bg-dark text-white hover:bg-black active:scale-95 shadow-slate-200'}`}
                              >
                                  <Icon name="save" className="w-4 h-4"/> บันทึก
                              </button>
                          </div>
                      </div>
                      
                      {/* Exception List (สิทธิพิเศษ) */}
                      {!isLockedByGlobal && (
                        <div className="bg-slate-50/50 rounded-xl p-3 border border-slate-100 flex flex-col sm:flex-row flex-wrap sm:items-center gap-3">
                            <div className="flex items-center">
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mr-2 whitespace-nowrap"><Icon name="unlock" className="w-3 h-3 inline mr-1"/> Manual Override:</span>
                            </div>
                            
                            <div className="flex flex-wrap gap-2 flex-1">
                                {activeExceptions.length > 0 ? activeExceptions.map(uid => {
                                    const u = users.find(usr => usr.id === uid);
                                    const expiry = exceptions[uid].toDate();
                                    if(expiry < new Date()) return null;
                                    return (
                                        <div key={uid} className="flex items-center gap-2 bg-white border border-yellow-200 text-yellow-700 px-3 py-1 rounded-lg text-xs font-bold shadow-sm">
                                            <span>{u ? u.displayName : 'Unknown'} (ถึง {expiry.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})})</span>
                                            <button onClick={() => handleRemoveException(p.id, uid)} className="hover:text-red-500 bg-yellow-50 rounded-full p-0.5"><Icon name="x" className="w-3 h-3"/></button>
                                        </div>
                                    )
                                }) : <span className="text-xs text-slate-400 italic">ไม่มีรายการยกเว้น</span>}
                            </div>
                            
                            {p.id && (
                                <button onClick={() => setExceptionModal({ show: true, periodId: id, docId: p.id })} className="w-full sm:w-auto text-xs bg-white border border-slate-200 text-primary-600 px-4 py-2 rounded-lg font-bold hover:bg-primary-50 transition-colors flex items-center justify-center gap-1 shadow-sm mt-2 sm:mt-0">
                                    <Icon name="plus" className="w-3 h-3"/> เพิ่มสิทธิ์พิเศษ
                                </button>
                            )}
                        </div>
                      )}
                  </div>
              );
          };

          return (
              <div className="space-y-6 pb-20">
                    <div className="bg-orange-50 p-6 rounded-2xl border border-orange-100 flex gap-4 items-start shadow-sm">
                      <div className="p-3 bg-white rounded-xl text-orange-500 shadow-sm"><Icon name="clock" className="w-6 h-6"/></div>
                      <div>
                          <h4 className="font-bold text-orange-800 text-lg">ตั้งเวลาเปิด-ปิดการส่งงาน</h4>
                          <p className="text-sm text-orange-600 mt-1 leading-relaxed">
                            สามารถ <strong>"ปิดรับงาน"</strong> เพื่อล็อคทันทีโดยไม่ต้องตั้งเวลา <br/>
                            หาก <strong>ตั้งค่ารวมทั้งโรงเรียนปิดรับงาน</strong> มาตรฐานย่อยทั้งหมดจะถูกปิดตามไปด้วย
                          </p>
                      </div>
                  </div>

                  <PeriodRow title="ตั้งค่ารวมทั้งโรงเรียน" id="GLOBAL" />
                  
                  <div className="relative py-4">
                      <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200"></div></div>
                      <div className="relative flex justify-center"><span className="bg-[#F8FAFC] px-4 text-sm text-slate-400 font-bold">หรือกำหนดแยกตามมาตรฐาน</span></div>
                  </div>

                  {standards.map((std, idx) => (
                      <PeriodRow key={std.id} title={std.title} id={std.id} />
                  ))}

                  {/* Exception Modal (คงเดิม) */}
                  {exceptionModal.show && (
                      <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 modal-backdrop animate-scale-in">
                          <div className="bg-white rounded-[2rem] w-full max-w-sm p-8 shadow-2xl border border-white/20">
                              <h3 className="font-bold text-xl text-dark mb-1">ปลดล็อกกรณีพิเศษ</h3>
                              <p className="text-slate-400 text-sm mb-6">อนุญาตให้ส่งงานล่าช้าได้ชั่วคราว</p>
                              <div className="space-y-4">
                                  <div>
                                      <label className="text-xs font-bold text-slate-500 ml-1 mb-1 block">เลือกครูผู้สอน</label>
                                      <div className="relative">
                                          <select className="modern-input appearance-none" value={selectedUser} onChange={e => setSelectedUser(e.target.value)}>
                                              <option value="">-- เลือกรายชื่อ --</option>
                                              {users.filter(u => u.role !== 'superadmin').map(u => <option key={u.id} value={u.id}>{u.displayName} ({u.email.split('@')[0]})</option>)}
                                          </select>
                                          <div className="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-slate-500"><Icon name="chevron-down" className="w-4 h-4" /></div>
                                      </div>
                                  </div>
                                  <div>
                                      <label className="text-xs font-bold text-slate-500 ml-1 mb-1 block">ระยะเวลาปลดล็อก</label>
                                      <div className="grid grid-cols-3 gap-2">
                                          {[24, 48, 72].map(h => (
                                              <button key={h} onClick={() => setUnlockHours(h)} className={`py-2 rounded-xl text-xs font-bold transition-all border ${unlockHours === h ? 'bg-primary-600 text-white border-primary-600 shadow-md' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>
                                                  {h} ชม.
                                              </button>
                                          ))}
                                      </div>
                                  </div>
                                  <div className="flex gap-3 mt-6">
                                      <button onClick={() => setExceptionModal({ show: false })} className="flex-1 py-3 rounded-2xl font-bold text-slate-500 hover:bg-slate-100 transition-colors">ยกเลิก</button>
                                      <button onClick={handleAddException} disabled={!selectedUser} className="flex-1 py-3 rounded-2xl bg-primary-600 text-white font-bold hover:bg-primary-700 shadow-lg shadow-primary-500/30 disabled:opacity-50 transition-all">ยืนยัน</button>
                                  </div>
                              </div>
                          </div>
                      </div>
                  )}
              </div>
          );
      };
      
      const MaintenanceDashboard = ({ user, showToast, evidences, currentYear }) => {
          const [activeSubTab, setActiveSubTab] = useState('overview');
          const [currentPage, setCurrentPage] = useState(1);
          const [rowsPerPage, setRowsPerPage] = useState(30);

          // รีเซ็ตหน้าไปที่ 1 เสมอเมื่อเปลี่ยน Tab ย่อย
          useEffect(() => {
              setCurrentPage(1);
          }, [activeSubTab]);

          // ++++++++++++++++++++++++++++++++++++++++++++++++++++++
          // 1. เริ่มส่วนที่เพิ่ม: Integrity Check State & Logic
          // ++++++++++++++++++++++++++++++++++++++++++++++++++++++
          const [brokenLinks, setBrokenLinks] = useState([]);
          const [isCheckingIntegrity, setIsCheckingIntegrity] = useState(false);
          const [integrityProgress, setIntegrityProgress] = useState(0);

          // Helper: ดึง Drive ID จาก URL
          const getDriveId = (url) => {
              if (!url) return null;
              const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
              return match ? match[1] : null;
          };

          // Function: สแกนหา Broken Links
          const handleCheckBrokenLinks = async () => {
              if (!confirm("การตรวจสอบอาจใช้เวลาสักครู่ ขึ้นอยู่กับจำนวนไฟล์ในระบบ ยืนยันการตรวจสอบ?")) return;
              
              setIsCheckingIntegrity(true);
              setBrokenLinks([]);
              setIntegrityProgress(0);

              try {
                  // 1. รวบรวมข้อมูลจากทุก Collection
                  const collections = [
                      { name: 'evidences', label: 'เอกสารหลักฐาน' },
                      { name: 'templates', label: 'ไฟล์แม่แบบ' },
                      { name: 'item_descriptions', label: 'คำอธิบายตัวบ่งชี้' },
                      { name: 'summary_templates', label: 'แบบฟอร์มสรุป' },
                      { name: 'summary_submissions', label: 'ไฟล์ส่งงานสรุป' },
                      { name: 'operation_result_templates', label: 'แบบฟอร์มผลการดำเนินงาน' },
                      { name: 'operation_result_submissions', label: 'ไฟล์ส่งงานผลการดำเนินงาน' },
                      { name: 'other_documents', label: 'เอกสารอื่น ๆ' }
                  ];

                  let allItems = [];
                  
                  // Fetch All Data
                  for (let col of collections) {
                      const snap = await db.collection(col.name).get();
                      const docs = snap.docs.map(doc => {
                          const data = doc.data();
                          return {
                              id: doc.id,
                              collection: col.name,
                              collectionLabel: col.label,
                              title: data.title || data.fileName || 'No Title',
                              fileUrl: data.fileUrl,
                              driveId: getDriveId(data.fileUrl)
                          };
                      }).filter(item => item.driveId);
                      allItems = [...allItems, ...docs];
                  }

                  // 2. แบ่งข้อมูลเป็น Chunks (ทีละ 30 ไฟล์)
                  const CHUNK_SIZE = 30;
                  const chunks = [];
                  for (let i = 0; i < allItems.length; i += CHUNK_SIZE) {
                      chunks.push(allItems.slice(i, i + CHUNK_SIZE));
                  }

                  let foundBroken = [];
                  
                  for (let i = 0; i < chunks.length; i++) {
                      const batch = chunks[i];
                      
                      // เรียก Google Script (ต้องมีฟังก์ชัน checkFileExistenceBatch ใน .gs ก่อน)
                      const missingInBatch = await new Promise((resolve, reject) => {
                          google.script.run
                              .withSuccessHandler(resolve)
                              .withFailureHandler(reject)
                              .checkFileExistenceBatch(batch);
                      });

                      if (missingInBatch && missingInBatch.length > 0) {
                          const detailedMissing = missingInBatch.map(m => {
                              const original = allItems.find(x => x.id === m.id && x.collection === m.collection);
                              return { ...original, status: m.status };
                          });
                          foundBroken = [...foundBroken, ...detailedMissing];
                      }

                      setIntegrityProgress(Math.round(((i + 1) / chunks.length) * 100));
                  }

                  setBrokenLinks(foundBroken);
                  if (foundBroken.length === 0) showToast("ไม่พบไฟล์เสียหาย ระบบสมบูรณ์ดี");
                  else showToast(`ตรวจพบไฟล์มีปัญหา ${foundBroken.length} รายการ`, "orange");

              } catch (err) {
                  console.error(err);
                  showToast("เกิดข้อผิดพลาด: " + err.message, "error");
              } finally {
                  setIsCheckingIntegrity(false);
              }
          };

          // Function: ลบข้อมูลขยะ
          const handleCleanUpGhostData = async () => {
              if (brokenLinks.length === 0) return;
              if (!confirm(`ยืนยันการลบข้อมูลในฐานข้อมูลจำนวน ${brokenLinks.length} รายการ? (กู้คืนไม่ได้)`)) return;

              try {
                  const batch = db.batch();
                  brokenLinks.forEach(item => {
                      const ref = db.collection(item.collection).doc(item.id);
                      batch.delete(ref);
                  });

                  await batch.commit();
                  await logSystemActivity(db, user, 'System Clean Up', `ลบข้อมูล Ghost Data จำนวน ${brokenLinks.length} รายการ`);
                  
                  setBrokenLinks([]);
                  showToast("ล้างข้อมูลขยะเรียบร้อยแล้ว");
              } catch (err) {
                  showToast("ลบข้อมูลไม่สำเร็จ", "error");
              }
          };

          // --- System Data ---
          const [maintenanceMode, setMaintenanceMode] = useState(false);
          const [evaluationEnabled, setEvaluationEnabled] = useState(true);
          const [sysAnnouncement, setSysAnnouncement] = useState({ show: false, title: '', content: '' });
          
          // --- General Data ---
          const [users, setUsers] = useState([]);
          const [years, setYears] = useState([]);
          const [logs, setLogs] = useState([]); // เก็บ Logs ทั้งหมด
          const [isLogsLoading, setIsLogsLoading] = useState(false); 
          const [currentLogPage, setCurrentLogPage] = useState(1); 
          const [displayItemsPerPage, setDisplayItemsPerPage] = useState(25); 

          // 👇 วางทับโค้ดดึง Logs เดิมด้วยชุดนี้ 👇
          useEffect(() => {
              // โหลด Logs มาเผื่อไว้ 500 รายการล่าสุด (แบบ Realtime)
              setIsLogsLoading(true);
              const unsubscribe = db.collection('audit_logs')
                  .orderBy('timestamp', 'desc')
                  .limit(500) 
                  .onSnapshot(snap => {
                      const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                      setLogs(data);
                      setIsLogsLoading(false);
                  }, err => {
                      console.error("Error fetching logs:", err);
                      setIsLogsLoading(false);
                  });

              return () => unsubscribe();
          }, []);

          const [stats, setStats] = useState({ users: 0, files: 0, templates: 0 });
          
          // --- Inputs ---
          const [searchUser, setSearchUser] = useState('');
          const [newYear, setNewYear] = useState('');
          const [announceForm, setAnnounceForm] = useState({ title: '', content: '' });

          // --- Initial Fetch ---

          useEffect(() => {
              // 1. Config & Announcement
              const unsubConfig = db.collection('system_settings').doc('config').onSnapshot(doc => {
                  if (doc.exists) {
                      setMaintenanceMode(doc.data().maintenance || false);
                      setEvaluationEnabled(doc.data().evaluationEnabled !== false); // ✅ เพิ่มบรรทัดนี้
                  }
              });
              const unsubAnnounce = db.collection('system_settings').doc('announcement').onSnapshot(doc => {
                  if (doc.exists) {
                      setSysAnnouncement(doc.data());
                      setAnnounceForm({ title: doc.data().title || '', content: doc.data().content || '' });
                  }
              });

              // ✅ 2. Users (ใช้ Caching) - [แก้ใหม่] ส่วนรองรับบัญชีใหม่
              loadDataWithCache(
                  'cache_users_v1', 
                  async () => {
                      try {
                          // ✅ [แก้ไหม่] ลองใช้ plain collection ก่อน (ไม่ order) เพื่อป้องกัน index error
                          const snap = await db.collection('users').get();
                          let data = snap.docs.map(d => {
                              const userData = d.data();
                              // แปลง Timestamp เป็น Milliseconds เพื่อให้ JSON ไม่พัง
                              return {
                                  id: d.id,
                                  ...userData,
                                  lastLogin: userData.lastLogin ? { seconds: userData.lastLogin.seconds } : null,
                                  createdAt: userData.createdAt ? { seconds: userData.createdAt.seconds } : null
                              };
                          });
                          
                          // Sort by lastLogin desc ที่ฝั่ง JS แทน (เป็นหลีกเลี่ยง index)
                          data.sort((a, b) => {
                              const aTime = a.lastLogin?.seconds || 0;
                              const bTime = b.lastLogin?.seconds || 0;
                              return bTime - aTime;
                          });
                          
                          setStats(prev => ({ ...prev, users: snap.size }));
                          console.log("✅ Fetched users:", data.length, data.map(u => u.email));
                          return data;
                      } catch (err) {
                          console.error("❌ Error fetching users:", err);
                          return [];
                      }
                  },
                  setUsers
              );

              // ✅ 3. Years (ใช้ Caching)
              const fetchYears = () => {
                 // ดึง Cache มาโชว์ก่อน
                 const cachedYears = localStorage.getItem('cache_years');
                 if(cachedYears) {
                     setYears(JSON.parse(cachedYears));
                 }
                 
                 // แล้วค่อย Subscribe Realtime
                 return db.collection('academic_years').onSnapshot(snap => {
                      const yData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                      yData.sort((a, b) => b.year - a.year);
                      
                      // อัปเดต State และ Cache ทับ
                      setYears(yData);
                      localStorage.setItem('cache_years', JSON.stringify(yData));
                      
                      const activeYears = yData.filter(y => y.isActive).map(y => y.year);
                  });
              };
              const unsubYears = fetchYears();

              // 4. Stats อื่นๆ (นับรวมทุก Collection ที่เป็นการส่งงาน)
              Promise.all([
                  db.collection('evidences').get(),
                  db.collection('summary_submissions').get(),
                  db.collection('operation_result_submissions').get(),
                  db.collection('other_documents').get()
              ]).then(([evidencesSnap, summarySnap, opResultSnap, otherDocsSnap]) => {
                  const totalFiles = evidencesSnap.size + summarySnap.size + opResultSnap.size + otherDocsSnap.size;
                  setStats(prev => ({ ...prev, files: totalFiles }));
              });

              // นับ Template แยกต่างหากเหมือนเดิม
              db.collection('templates').get().then(snap => setStats(prev => ({ ...prev, templates: snap.size })));

              return () => { 
                  unsubConfig(); 
                  unsubAnnounce(); 
                  if(typeof unsubYears === 'function') unsubYears();
              };
          }, []);
          
          // --- Handlers ---

          const toggleMaintenance = async () => {
              const newValue = !maintenanceMode;
              await db.collection('system_settings').doc('config').set({ maintenance: newValue }, { merge: true });
              await logSystemActivity(db, user, 'System Control', `เปลี่ยนโหมดบำรุงรักษาเป็น: ${newValue ? 'เปิด' : 'ปิด'}`);
              showToast(`ระบบ ${newValue ? 'ปิดปรับปรุง' : 'เปิดใช้งาน'} แล้ว`);
          };

          const saveAnnouncement = async () => {
              await db.collection('system_settings').doc('announcement').set({
                  ...announceForm,
                  show: sysAnnouncement.show, // Keep current toggle state
                  updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              }, { merge: true });
              await logSystemActivity(db, user, 'Announcement', `แก้ไขข้อความประกาศระบบ`);
              showToast('บันทึกข้อความประกาศแล้ว');
          };

          const toggleAnnouncement = async () => {
              const newValue = !sysAnnouncement.show;
              await db.collection('system_settings').doc('announcement').set({ show: newValue }, { merge: true });
              
              // [เพิ่มบรรทัดนี้] บันทึก Log
              await logSystemActivity(db, user, 'Announcement', `เปลี่ยนสถานะประกาศ: ${newValue ? 'แสดง' : 'ซ่อน'}`);
              
              showToast(`ประกาศถูก ${newValue ? 'แสดง' : 'ซ่อน'} แล้ว`);
          };

          const toggleEvaluationSystem = async () => {
              const newValue = !evaluationEnabled;
              await db.collection('system_settings').doc('config').set({ evaluationEnabled: newValue }, { merge: true });
              await logSystemActivity(db, user, 'System Control', `เปลี่ยนสถานะเมนูระบบประเมินเป็น: ${newValue ? 'เปิด' : 'ปิด'}`);
              showToast(`เมนูระบบประเมิน ${newValue ? 'เปิดใช้งาน' : 'ถูกซ่อน'} แล้ว`);
          };

          // ฟังก์ชันลบทีละรายการ
          const handleDeleteLog = async (logId) => {
              // ใช้ confirm ของ Browser เพื่อความรวดเร็ว หรือจะใช้ Modal ของคุณก็ได้
              if(!confirm("ยืนยันการลบรายการประวัตินี้? (ไม่สามารถกู้คืนได้)")) return;

              try {
                  await db.collection('audit_logs').doc(logId).delete();
                  showToast("ลบรายการบันทึกเรียบร้อยแล้ว");
              } catch (err) {
                  console.error(err);
                  showToast("เกิดข้อผิดพลาดในการลบ", "error");
              }
          };

          // (ตัวเลือกเสริม) ฟังก์ชันล้างประวัติทั้งหมดที่เก่ากว่า 30 วัน หรือล้างทั้งหมด
          const handleClearAllLogs = async () => {
              if(!confirm("คำเตือน! คุณกำลังจะลบประวัติกิจกรรมทั้งหมดในหน้านี้\nยืนยันที่จะทำต่อหรือไม่?")) return;
              
              try {
                  const batch = db.batch();
                  logs.forEach(log => {
                      const ref = db.collection('audit_logs').doc(log.id);
                      batch.delete(ref);
                  });
                  await batch.commit();
                  showToast("ล้างประวัติกิจกรรมเรียบร้อยแล้ว");
              } catch (err) {
                  showToast("ลบข้อมูลไม่สำเร็จ", "error");
              }
          };
          
          // =========================================================
          // 🟢 ฟังก์ชันแยกสีของป้ายกิจกรรม (ย้ายมาไว้ตรงนี้เพื่อให้ใช้ได้ทุกหน้า)
          // =========================================================
          const getActionColor = (action) => {
              if (!action) return 'bg-slate-100 text-slate-600 border-slate-200';
              const act = action.toLowerCase();
              
              // 🔴 กลุ่มลบ / ล้างข้อมูล / ยกเลิกสิทธิ์ / ออกจากระบบ
              if (act.includes('delete') || act.includes('remove') || act.includes('clear') || act.includes('clean') || act.includes('logout')) {
                  return 'bg-red-100 text-red-600 border border-red-200';
              }
              // 🟢 กลุ่มเพิ่ม / สร้าง / อัปโหลด / ประเมินผล / เข้าสู่ระบบ
              if (act.includes('upload') || act.includes('add') || act.includes('create') || act.includes('evaluate') || act.includes('login')) {
                  return 'bg-emerald-100 text-emerald-600 border border-emerald-200';
              }
              // 🟠 กลุ่มแก้ไข / เปลี่ยนชื่อ / ประเมินสถานะ / คอมเมนต์
              if (act.includes('update') || act.includes('edit') || act.includes('rename') || act.includes('status') || act.includes('comment')) {
                  return 'bg-orange-100 text-orange-600 border border-orange-200';
              }
              // 🟣 กลุ่มจัดการระบบ / ตั้งค่า / ผู้ใช้งาน / ปีการศึกษา / เวลา
              if (act.includes('system') || act.includes('control') || act.includes('management') || act.includes('user') || act.includes('year') || act.includes('deadline') || act.includes('exception')) {
                  return 'bg-purple-100 text-purple-600 border border-purple-200';
              }
              // 🔵 กลุ่มดาวน์โหลด / ออกรายงาน / ประกาศ
              if (act.includes('download') || act.includes('export') || act.includes('announcement') || act.includes('open')) {
                  return 'bg-blue-100 text-blue-600 border border-blue-200';
              }
              
              // ⚪ ค่าเริ่มต้น (กิจกรรมอื่นๆ)
              return 'bg-slate-100 text-slate-600 border border-slate-200';
          };

          const handleAddYear = async (e) => {
              e.preventDefault();
              if(!newYear || newYear.length !== 4) return showToast("กรุณาระบุปี พ.ศ. 4 หลัก", "error");
              if (years.some(y => y.year.toString() === newYear)) return showToast("ปีการศึกษานี้มีอยู่แล้ว", "error");

              await db.collection('academic_years').add({
                  year: parseInt(newYear),
                  isActive: true,
                  createdAt: firebase.firestore.FieldValue.serverTimestamp()
              });
              await logSystemActivity(db, user, 'Year Management', `เพิ่มปีการศึกษา ${newYear}`);
              setNewYear('');
              showToast(`เพิ่มปีการศึกษา ${newYear} สำเร็จ`);
          };

          const toggleYearStatus = async (yearDoc) => {
              const newStatus = !yearDoc.isActive;
              await db.collection('academic_years').doc(yearDoc.id).update({ isActive: newStatus });
              
              // [เพิ่มบรรทัดนี้] บันทึก Log
              await logSystemActivity(db, user, 'Year Management', `เปลี่ยนสถานะปี ${yearDoc.year}: ${newStatus ? 'แสดง' : 'ซ่อน'}`);
              
              showToast(`อัปเดตสถานะปี ${yearDoc.year} เรียบร้อย`);
          };

          const deleteYear = async (yearDoc) => {
              if(!confirm(`ยืนยันการลบปี ${yearDoc.year}? (แนะนำให้ซ่อนแทนการลบ)`)) return;
              await db.collection('academic_years').doc(yearDoc.id).delete();
              await logSystemActivity(db, user, 'Year Management', `ลบปีการศึกษา ${yearDoc.year}`);
              showToast('ลบปีการศึกษาเรียบร้อย');
          };

          const changeUserRole = async (targetUser, newRole) => {
              await db.collection('users').doc(targetUser.id).update({ role: newRole });
              await logSystemActivity(db, user, 'User Management', `เปลี่ยนสิทธิ์ ${targetUser.email} เป็น ${newRole}`);
              showToast('เปลี่ยนบทบาทสำเร็จ');
          };

          const filteredUsers = users.filter(u => 
              (u.displayName || '').toLowerCase().includes(searchUser.toLowerCase()) || 
              (u.email || '').toLowerCase().includes(searchUser.toLowerCase())
          );

          // --- Render Sections ---

          const renderOverview = () => (
              <div className="space-y-6 animate-fade-in-up">
                  {/* Stats Grid */}
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                      <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                          <div className="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center shadow-inner"><Icon name="users" className="w-6 h-6"/></div>
                          <div><div className="text-2xl font-bold text-dark">{stats.users}</div><div className="text-xs text-slate-400">ผู้ใช้งานทั้งหมด</div></div>
                      </div>
                      <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                          <div className="w-12 h-12 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center shadow-inner"><Icon name="file-text" className="w-6 h-6"/></div>
                          <div><div className="text-2xl font-bold text-dark">{stats.files}</div><div className="text-xs text-slate-400">ไฟล์ทั้งหมด</div></div>
                      </div>
                      <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                          <div className="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center shadow-inner"><Icon name="calendar" className="w-6 h-6"/></div>
                          <div><div className="text-2xl font-bold text-dark">{years.length}</div><div className="text-xs text-slate-400">ปีการศึกษา</div></div>
                      </div>
                      <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                          <div className={`w-12 h-12 rounded-xl flex items-center justify-center shadow-inner ${maintenanceMode ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-500'}`}><Icon name="server" className="w-6 h-6"/></div>
                          <div><div className="text-lg font-bold text-dark">{maintenanceMode ? 'ปิดปรับปรุง' : 'ปกติ'}</div><div className="text-xs text-slate-400">สถานะระบบ</div></div>
                      </div>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                      {/* System Controls */}
                      <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                          <div className="p-4 border-b border-slate-100 bg-slate-50/50 font-bold text-slate-700 flex items-center gap-2">
                              <Icon name="settings" className="w-4 h-4"/> ตั้งค่าระบบ
                          </div>
                          <div className="p-6 space-y-6">
                              {/* Maintenance Toggle */}
                              <div className="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100">
                                  <div>
                                      <div className="font-bold text-dark text-sm flex items-center gap-2">
                                          <Icon name="settings" className="w-4 h-4 text-emerald-500"/>
                                          โหมดบำรุงรักษา
                                      </div>
                                      <div className="text-xs text-slate-400 mt-1">ตัดการเข้าถึงของ User ทั่วไปทันที</div>
                                  </div>
                                  <label className="relative inline-flex items-center cursor-pointer">
                                      <input type="checkbox" checked={maintenanceMode} onChange={toggleMaintenance} className="sr-only peer"/>
                                      <div className="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-500"></div>
                                  </label>
                              </div>
                              {/* ✅ Evaluation System Toggle (เพิ่มใหม่ตรงนี้) */}
                              <div className="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100">
                                  <div>

              const systemLogs = logs.filter(log => log.action !== 'Login' && log.action !== 'Logout');
              
              // 2. คำนวณข้อมูลสำหรับการแบ่งหน้า
              const totalItems = systemLogs.length;
              const totalPages = Math.ceil(totalItems / displayItemsPerPage) || 1;
              const safeCurrentPage = Math.min(currentLogPage, totalPages); // ป้องกันบั๊กหน้าเกิน
              
              const indexOfLastItem = safeCurrentPage * displayItemsPerPage;
              const indexOfFirstItem = indexOfLastItem - displayItemsPerPage;
              
              // 3. หั่นข้อมูลตามหน้าปัจจุบันและจำนวนที่เลือก (25, 50, 100)
              const currentItems = systemLogs.slice(indexOfFirstItem, indexOfLastItem);

              return (
                  <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden animate-fade-in-up flex flex-col">
                      <div className="p-4 md:p-6 border-b border-slate-100 bg-slate-50/50 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                          <div className="flex flex-col">
                              <h3 className="font-bold text-dark flex items-center gap-2">

                                  <select 
                                      value={displayItemsPerPage} 
                                      onChange={(e) => {
                                          setDisplayItemsPerPage(parseInt(e.target.value));
                                          setCurrentLogPage(1);
                                      }}
                                      className="flex-1 md:flex-none px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-600 hover:border-primary-300 focus:border-primary-500 outline-none transition-colors"

                                      <th className="p-4 border-b w-40">ผู้ดำเนินการ</th>
                                      <th className="p-4 border-b w-32">กิจกรรม</th>
                                      <th className="p-4 border-b">รายละเอียด</th>

                                          <td className="p-4 text-slate-600 text-xs md:text-sm">{log.details}</td>

              // 1. กรองเอาเฉพาะกิจกรรมที่เป็น Login และ Logout
              const authLogs = logs.filter(log => log.action === 'Login' || log.action === 'Logout');

              // 2. คำนวณข้อมูลสำหรับการแบ่งหน้า
              const totalItems = authLogs.length;
              const totalPages = Math.ceil(totalItems / displayItemsPerPage) || 1;
              const safeCurrentPage = Math.min(currentPage, totalPages) || 1; 
              
              const indexOfLastItem = safeCurrentPage * displayItemsPerPage;
              const indexOfFirstItem = indexOfLastItem - displayItemsPerPage;
              const currentItems = authLogs.slice(indexOfFirstItem, indexOfLastItem);

              // 3. ฟังก์ชันสำหรับลบข้อมูลเฉพาะหน้านี้
              const handleClearCurrentAuthLogs = async () => {
                  if(!confirm(`คำเตือน! คุณกำลังจะลบประวัติการเข้าใช้งานในหน้านี้จำนวน ${currentItems.length} รายการ\nยืนยันที่จะทำต่อหรือไม่? (กู้คืนไม่ได้)`)) return;
                  
                  try {
                      const batch = db.batch();
                      currentItems.forEach(log => {
                          const ref = db.collection('audit_logs').doc(log.id);
                          batch.delete(ref);
                      });
                      await batch.commit();
                      showToast("ล้างประวัติเข้าใช้งานหน้านี้เรียบร้อยแล้ว");
                  } catch (err) {
                      console.error("Clear Auth Logs Error:", err);

                              <div className="flex items-center gap-2 flex-1 md:flex-none">

                                  <select 
                                      value={displayItemsPerPage} 
                                      onChange={(e) => {
                                          setDisplayItemsPerPage(parseInt(e.target.value));
                                          setCurrentPage(1);
                                      }}

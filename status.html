<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบสถานะ | Samsen Astro POSN</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-purple: #311B5E; 
            --theme-purple-light: #4A2B8C;
            --theme-orange: #FF8F00; 
            --theme-orange-hover: #E68100;
            --bg-light: #F8F9FA;
            --text-dark: #181C32;
            --text-muted: #7E8299;
            --danger: #F1416C;
            --success: #50CD89;
            --border-color: #E4E6EF;
            --input-bg: #ffffff;
            --border-radius: 12px;
            --card-radius: 16px;
            --box-shadow: 0px 10px 30px 0px rgba(49, 27, 94, 0.05);
        }

        body { font-family: 'Sarabun', sans-serif; background: var(--bg-light); margin: 0; color: var(--text-dark); overflow-x: hidden; }

        /* ================= TOP ADMIN BAR & NAVIGATION ================= */
        .top-admin-bar { background-color: #181C32; color: var(--success); text-align: center; padding: 8px; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; display: none; }
        .top-admin-bar span { color: white; font-weight: 400; margin-right: 10px; }
        #topBarRoleText { color: var(--success); }

        .navbar { background-color: var(--theme-purple); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        
        /* แบ่ง Navbar เป็น 3 ส่วน */
        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .nav-center { flex: 2; display: flex; justify-content: center; }
        .nav-right { flex: 1; display: flex; justify-content: flex-end; align-items: center; }

        .nav-brand { display: flex; align-items: center; gap: 15px; text-decoration: none; color: white;}
        .nav-brand img { height: 45px; width: auto; background: white; padding: 3px; border-radius: 8px;}
        .brand-title { font-weight: 700; font-size: 1.2rem; line-height: 1.1;}
        .brand-sub { font-size: 0.8rem; color: #D1C4E9; line-height: 1.1;}
        
        .nav-links { display: flex; gap: 22px; align-items: center; flex-wrap: wrap; justify-content: center;}
        .nav-links a { color: white; text-decoration: none; font-weight: 500; font-size: 1rem; transition: color 0.3s; }
        .nav-links a:hover { color: var(--theme-orange); }

        .nav-profile { display: none; align-items: center; gap: 12px; background: rgba(255,255,255,0.1); padding: 5px 15px 5px 5px; border-radius: 50px;}
        .profile-avatar { width: 35px; height: 35px; background: var(--success); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        .profile-info { color: white; font-size: 0.9rem; line-height: 1.2; text-align: left; }
        .profile-name { font-weight: 600; }
        .profile-role { font-size: 0.75rem; color: #D1C4E9; }
        .btn-logout-icon { background: none; border: none; color: var(--theme-orange); font-size: 1.2rem; cursor: pointer; padding: 5px; transition: 0.3s; margin-left: 5px; display: flex; align-items: center;}
        .btn-logout-icon:hover { color: var(--danger); }

        /* ================= MAIN CONTAINER ================= */
        .page-wrapper { display: flex; justify-content: center; padding: 50px 20px; }
        .container { max-width: 800px; width: 100%; }

        .header-title { text-align: center; margin-bottom: 40px; }
        h2 { color: var(--theme-purple); margin: 0 0 10px 0; font-weight: 700; font-size: 2rem; letter-spacing: -0.5px; }

        .search-card { background: #ffffff; padding: 30px; border-radius: var(--card-radius); box-shadow: var(--box-shadow); margin-bottom: 30px; border-top: 4px solid var(--theme-orange); }
        .search-box { display: flex; gap: 15px; }
        .search-box input { flex: 1; padding: 16px 20px; border: 2px solid var(--border-color); border-radius: 50px; font-size: 1.1rem; font-family: 'Sarabun', sans-serif; color: var(--text-dark); transition: all 0.3s ease; text-align: center; letter-spacing: 1px;}
        .search-box input:focus { border-color: var(--theme-purple); outline: none; box-shadow: 0 0 0 3px rgba(49, 27, 94, 0.1);}
        .search-box button { padding: 16px 35px; background: var(--theme-purple); color: white; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(49, 27, 94, 0.2); font-family: 'Sarabun'; }
        .search-box button:hover:not(:disabled) { background: var(--theme-purple-light); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(49, 27, 94, 0.3);}
        .search-box button:disabled { background: var(--text-muted); cursor: not-allowed; box-shadow: none; }

        #resultWrapper { display: none; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .app-block { margin-bottom: 50px; padding: 30px 20px 20px; border: 2px solid var(--border-color); border-radius: var(--card-radius); position: relative; background: transparent; }
        .app-badge { position: absolute; top: -15px; left: 20px; background: var(--theme-purple); color: white; padding: 5px 20px; border-radius: 50px; font-size: 0.95rem; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}

        .card { background: #ffffff; border-radius: 12px; box-shadow: var(--box-shadow); margin-bottom: 20px; overflow: hidden; border: 1px solid var(--border-color); }
        .card-header { background: var(--bg-light); padding: 18px 25px; border-bottom: 1px solid var(--border-color); font-weight: 700; font-size: 1.15rem; color: var(--theme-purple); }
        .card-body { padding: 30px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 25px 20px; margin-bottom: 25px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        
        .data-item { display: flex; flex-direction: column; }
        .label { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;}
        .value { font-size: 1.1rem; font-weight: 600; color: var(--text-dark); }
        
        .status-container { text-align: center; padding-top: 25px; margin-top: 15px; border-top: 1px dashed var(--border-color); }
        .status-badge { display: inline-block; padding: 10px 25px; border-radius: 50px; font-weight: 700; font-size: 1.15rem; margin-top: 10px; }
        .status-pass { background: #E8F5E9; color: #2E7D32; border: 1px solid #A5D6A7; }
        .status-fail { background: #FFEBEE; color: #C62828; border: 1px solid #EF9A9A; }
        .status-wait { background: #FFF8E1; color: #F57C00; border: 1px solid #FFE082; }

        .note-text { color: var(--danger); font-size: 0.95rem; margin-top: 15px; font-weight: 500; background: #FFF5F8; padding: 10px; border-radius: 8px;}
        .score-highlight { font-size: 1.8rem; font-weight: 700; color: var(--theme-orange); }
        .rank-highlight { font-size: 1.5rem; font-weight: 700; color: var(--theme-purple); }

        /* 🌟 Responsive Adjustments */
        @media (max-width: 992px) {
            .navbar { flex-direction: column; padding: 15px; gap: 15px; }
            .nav-left, .nav-center, .nav-right { flex: unset; justify-content: center; width: 100%; }
        }

        @media (max-width: 768px) { 
            .search-box { flex-direction: column; } 
            .search-box button { width: 100%; } 
            .grid-2, .grid-3 { grid-template-columns: 1fr; gap: 20px; }
            .card-body { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="adminTopBar" class="top-admin-bar">
        <span><svg style="width:14px;height:14px;vertical-align:middle;fill:white;margin-top:-2px;" viewBox="0 0 24 24"><path d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1M12,5A3,3 0 0,1 15,8A3,3 0 0,1 12,11A3,3 0 0,1 9,8A3,3 0 0,1 12,5M17.13,17C15.92,18.85 14.11,20.24 12,20.92C9.89,20.24 8.08,18.85 6.87,17C6.53,16.5 6.24,16 6,15.47C6,13.82 8.71,12.47 12,12.47C15.29,12.47 17.96,13.82 17.96,15.47C17.75,16 17.46,16.5 17.13,17Z" /></svg> โหมดผู้ดูแลระบบ:</span> 
        <span id="topBarRoleText">คุณกำลังเข้าสู่ระบบในฐานะเจ้าหน้าที่ศูนย์สอบ</span>
    </div>

    <nav class="navbar">
        <div class="nav-left">
            <a href="home.html" class="nav-brand">
                <img src="assets/samsen-emblem.png" alt="Samsen Logo">
                <div>
                    <div class="brand-title">SAMSEN ASTRO</div>
                    <div class="brand-sub">POSN System</div>
                </div>
            </a>
        </div>

        <div class="nav-center">
            <div class="nav-links">
                <a href="home.html">หน้าแรก</a>
                <a href="register.html">สมัครสอบ</a>
                <a href="status.html" style="color: var(--theme-orange); font-weight: 700;">ตรวจสอบสถานะ</a>
                <a href="contact.html">ติดต่อเรา</a>

                <a href="dashboard.html" class="auth-admin" style="display: none; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 20px; color: var(--success);">ภาพรวม</a>
                <a href="manage_applicants.html" class="auth-admin" style="display: none; color: var(--success);">จัดการผู้สมัคร</a>
                <a href="manage_exam.html" class="auth-admin" style="display: none; color: var(--success);">จัดห้องสอบ</a>
                <a href="manage_score.html" class="auth-admin" style="display: none; color: var(--success);">บันทึกคะแนน</a>
                
                <a href="it.html" class="auth-it" style="display: none; color: var(--success);">ตั้งค่าระบบ</a>
            </div>
        </div>

        <div class="nav-right">
            <div class="nav-profile" id="profileForm">
                <div class="profile-avatar" id="userAvatar">A</div>
                <div class="profile-info">
                    <div class="profile-name" id="displayName">ชื่อผู้ใช้</div>
                    <div class="profile-role" id="displayRole">ตำแหน่ง</div>
                </div>
                <button class="btn-logout-icon" onclick="handleLogout()" title="ออกจากระบบ">
                    <svg viewBox="0 0 24 24" style="width:20px;height:20px;"><path d="M16,17V14H9V10H16V7L21,12L16,17M14,2A2,2 0 0,1 16,4V6H14V4H5V20H14V18H16V20A2,2 0 0,1 14,22H5A2,2 0 0,1 3,20V4A2,2 0 0,1 5,2H14Z" /></svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="container">
            <div class="header-title">
                <h2>ตรวจสอบสถานะการสมัครสอบ</h2>
                <span style="color: #7E8299; font-weight: 500; font-size: 1.1rem;">ค้นหาด้วยเลขประจำตัวประชาชน (หากมีหลายใบสมัคร ระบบจะแสดงทั้งหมด)</span>
            </div>
            
            <div class="search-card">
                <div class="search-box">
                    <input type="text" id="searchId" placeholder="กรอกเลขประจำตัวประชาชน 13 หลัก" maxlength="13" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    <button id="searchBtn" onclick="checkStatus()">ค้นหาข้อมูล</button>
                </div>
            </div>

            <div id="resultWrapper"></div>
            
        </div>
    </div>

    <script>
        // ⚠️ นำ Web App URL อันใหม่ที่ Deploy เสร็จแล้วมาใส่ตรงนี้
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzzwaptCzF04rIZ3FKlC3mlbzQPtKEi_j3Yi1Wccuya_V3bo-EBz4_VOOT12kFRD-2uDg/exec";

        // ตัวแปรเก็บค่าจากเซิร์ฟเวอร์
        let activeYear = new Date().getFullYear() + 543;
        let systemPhase = '1';

        window.onload = function() {
            // โชว์เมนูแอดมินถ้าคนที่ล็อกอินอยู่เป็นแอดมิน
            const currentRole = localStorage.getItem('userRole') || 'guest';
            const currentName = localStorage.getItem('userName') || '';
            
            const profileForm = document.getElementById('profileForm');
            const adminTopBar = document.getElementById('adminTopBar');

            if (currentRole !== 'guest') {
                profileForm.style.display = 'flex';
                adminTopBar.style.display = 'block';
                
                document.getElementById('displayName').innerText = currentName;
                document.getElementById('userAvatar').innerText = currentName ? currentName.charAt(0) : 'A';

                const dispRole = document.getElementById('displayRole');
                const topBarText = document.getElementById('topBarRoleText');

                if(currentRole === 'admin') {
                    if(dispRole) dispRole.innerText = 'Administrator';
                    document.getElementById('userAvatar').style.background = '#50CD89';
                    if(topBarText) topBarText.innerHTML = 'คุณกำลังเข้าสู่ระบบในฐานะ <b>เจ้าหน้าที่ศูนย์สอบ</b>';
                } else if(currentRole === 'it') {
                    if(dispRole) dispRole.innerText = 'IT Support';
                    document.getElementById('userAvatar').style.background = '#F1416C';
                    if(topBarText) topBarText.innerHTML = 'คุณกำลังเข้าสู่ระบบในฐานะ <b>ฝ่ายไอที (IT Support)</b>';
                }
            }

            // จัดการการแสดงผลของเมนู Admin และ IT
            document.querySelectorAll('.auth-admin').forEach(el => {
                if (currentRole === 'admin' || currentRole === 'it') {
                    el.style.display = el.tagName.toLowerCase() === 'a' ? 'inline-block' : 'flex';
                } else {
                    el.style.display = 'none';
                }
            });

            document.querySelectorAll('.auth-it').forEach(el => {
                if (currentRole === 'it') {
                    el.style.display = el.tagName.toLowerCase() === 'a' ? 'inline-block' : 'flex';
                } else {
                    el.style.display = 'none';
                }
            });

            // 🌟 สำคัญ: ไปถามเซิร์ฟเวอร์ก่อนว่าตอนนี้อยู่เฟสอะไร เพื่อนำมาใช้เปิดปิดการมองเห็นห้องสอบและคะแนน
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getSettings' })
            })
            .then(res => res.json())
            .then(res => {
                if(res.status === 'success') {
                    if (res.data.activeYear) activeYear = res.data.activeYear;
                    if (res.data.systemPhase) systemPhase = res.data.systemPhase;
                }
            })
            .catch(err => {
                console.error("ไม่สามารถโหลดตั้งค่าระบบได้, อาจทำให้แสดงผลผิดพลาด", err);
            });
        };

        // ฟังก์ชันสำหรับปุ่มออกจากระบบ (Logout)
        function handleLogout() { 
            localStorage.removeItem('userRole'); 
            localStorage.removeItem('userName'); 
            window.location.reload(); 
        }

        function checkStatus() {
            const searchId = document.getElementById('searchId').value;
            const btn = document.getElementById('searchBtn');

            if(searchId.length !== 13) {
                alert("กรุณากรอกเลขประจำตัวประชาชนให้ครบ 13 หลัก");
                return;
            }

            btn.innerHTML = "กำลังค้นหาข้อมูล... ⏳";
            btn.disabled = true;
            document.getElementById('resultWrapper').style.display = 'none';

            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'checkStatus',
                    idCard: searchId,
                    activeYear: activeYear 
                })
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    // ส่งข้อมูลที่เป็น Array ไปให้ฟังก์ชันวาด HTML
                    displayMultipleData(result.data);
                } else {
                    alert("❌ " + result.message);
                }
            })
            .catch(error => {
                alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์");
                console.error(error);
            })
            .finally(() => {
                btn.innerHTML = "ค้นหาข้อมูล";
                btn.disabled = false;
            });
        }

        // ฟังก์ชันวนลูปวาดกล่องใบสมัคร
        function displayMultipleData(appsData) {
            const wrapper = document.getElementById('resultWrapper');
            wrapper.innerHTML = ''; // เคลียร์ของเก่าทิ้งก่อน
            
            // วนลูปดึงข้อมูลทีละใบ
            appsData.forEach((data, index) => {
                
                // === จัดการเงื่อนไขและสีของสถานะ ===
                let statusText, statusClass, noteHtml = '';
                if (data.applyStatus === 'pass') {
                    statusText = "ผ่านเกณฑ์ มีสิทธิ์สอบ";
                    statusClass = "status-pass";
                } else if (data.applyStatus === 'fail') {
                    statusText = "ไม่ผ่านเกณฑ์การสมัคร";
                    statusClass = "status-fail";
                    noteHtml = `<div class="note-text">หมายเหตุจากกรรมการ: ${data.note || "กรุณาสมัครใหม่และแก้ไขข้อมูลให้ถูกต้อง"}</div>`;
                } else {
                    statusText = "อยู่ระหว่างรอการตรวจสอบ";
                    statusClass = "status-wait";
                }

                // === จัดการเงื่อนไขเฟส 2 (ห้องสอบ) ===
                let examIdText = "-", roomText = "-", seatText = "-";
                if (systemPhase >= 2 && data.applyStatus === 'pass') {
                    examIdText = data.examId || "รอประกาศ";
                    roomText = data.room || "รอประกาศ";
                    seatText = data.seat || "-";
                } else if (data.applyStatus === 'pass') {
                    examIdText = "รอประกาศ";
                    roomText = "รอประกาศ";
                }

                // === จัดการเงื่อนไขเฟส 3 (คะแนนและอันดับ) ===
                let examId2Text = "-", scoreText = "-", rankText = "-", scoreColor = "var(--text-muted)";
                if (systemPhase == 3 && data.applyStatus === 'pass') {
                    examId2Text = data.examId || "รอประกาศ";
                    scoreText = data.score || "รอประกาศ";
                    rankText = data.rank ? `${data.rank} / ${data.totalExaminees}` : "รอประกาศ";
                    scoreColor = data.score ? "var(--theme-orange)" : "var(--text-muted)";
                } else if (data.applyStatus === 'pass') {
                    examId2Text = "รอประกาศ";
                    scoreText = "รอประกาศ";
                }

                // === สร้างก้อน HTML สำหรับใบสมัคร 1 ใบ ===
                const appHtml = `
                    <div class="app-block">
                        <div class="app-badge">ใบสมัครที่ ${index + 1} (ส่งข้อมูลเมื่อ: ${data.time || '-'})</div>
                        
                        <div class="card">
                            <div class="card-header">ส่วนที่ 1: ข้อมูลการสมัครและสถานะอนุมัติ</div>
                            <div class="card-body">
                                <div class="grid-3">
                                    <div class="data-item"><span class="label">ระดับที่สมัคร</span><span class="value" style="color: var(--theme-orange);">${data.applyLevel || '-'}</span></div>
                                    <div class="data-item"><span class="label">ชื่อ</span><span class="value">${data.name || '-'}</span></div>
                                    <div class="data-item"><span class="label">นามสกุล</span><span class="value">${data.lastname || '-'}</span></div>
                                </div>
                                <div class="grid-3" style="margin-top: 25px;">
                                    <div class="data-item"><span class="label">ระดับชั้นปัจจุบัน</span><span class="value">${data.grade || '-'}</span></div>
                                    <div class="data-item"><span class="label">โรงเรียน</span><span class="value">${data.school || '-'}</span></div>
                                    <div class="data-item"><span class="label">จังหวัด</span><span class="value">${data.province || '-'}</span></div>
                                </div>
                                
                                <div class="status-container">
                                    <span class="label">สถานะการตรวจสอบสิทธิ์</span><br>
                                    <div class="status-badge ${statusClass}">${statusText}</div>
                                    ${noteHtml}
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header">ส่วนที่ 2: ข้อมูลที่นั่งสอบ</div>
                            <div class="card-body">
                                <div class="grid-3">
                                    <div class="data-item"><span class="label">เลขประจำตัวสอบ</span><span class="value">${examIdText}</span></div>
                                    <div class="data-item"><span class="label">อาคาร / ห้องสอบ</span><span class="value">${roomText}</span></div>
                                    <div class="data-item"><span class="label">ลำดับที่นั่ง</span><span class="value">${seatText}</span></div>
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header">ส่วนที่ 3: ผลการสอบคัดเลือก</div>
                            <div class="card-body">
                                <div class="grid-3">
                                    <div class="data-item"><span class="label">เลขประจำตัวสอบ</span><span class="value" style="font-size: 1.2rem;">${examId2Text}</span></div>
                                    <div class="data-item">
                                        <span class="label">คะแนนที่ได้</span>
                                        <span class="value score-highlight" style="color: ${scoreColor};">${scoreText}</span>
                                    </div>
                                    <div class="data-item">
                                        <span class="label">อันดับที่ (Rank)</span>
                                        <span class="value rank-highlight">${rankText}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                // นำ HTML ที่จัดเตรียมไว้ไปแปะต่อท้ายใน wrapper
                wrapper.innerHTML += appHtml;
            });
            
            // แสดงกล่องผลลัพธ์ทั้งหมด
            wrapper.style.display = 'block';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าหลัก | Samsen Astro POSN</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* กำหนดตัวแปรสีสไตล์ Metronic */
        :root {
            --kt-body-bg: #F3F6F9;          /* สีพื้นหลังสีเทาอมฟ้าสว่าง */
            --kt-text-dark: #181C32;        /* สีตัวหนังสือหลัก ดำอมน้ำเงิน */
            --kt-text-muted: #A1A5B7;       /* สีตัวหนังสือรอง เทา */
            --kt-primary: #009EF7;          /* สีฟ้า Primary */
            --kt-primary-active: #008BD9;   /* สีฟ้าเมื่อกด Hover */
            --kt-success: #50CD89;          /* สีเขียว Success */
            --kt-success-active: #47BE7D;   /* สีเขียวเมื่อกด Hover */
            --kt-border-radius: 0.75rem;    /* ความโค้งของกล่อง (12px) */
            --kt-btn-radius: 0.475rem;      /* ความโค้งของปุ่ม */
            --kt-box-shadow: 0px 0px 20px 0px rgba(76, 87, 125, 0.1); /* เงานุ่มๆ */
        }

        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: var(--kt-body-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container { 
            background: #ffffff; 
            padding: 3rem 2.5rem; 
            border-radius: var(--kt-border-radius); 
            box-shadow: var(--kt-box-shadow); 
            text-align: center; 
            max-width: 450px; 
            width: 90%; 
            box-sizing: border-box;
        }

        /* วงกลมล้อมรอบไอคอนด้านบน */
        .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background-color: #F1FAFF; /* พื้นหลังสีฟ้าอ่อนมากๆ */
            border-radius: 50%;
            margin-bottom: 1.5rem;
            font-size: 2.5rem;
        }

        h1 { 
            color: var(--kt-text-dark); 
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0; 
        }

        p { 
            color: var(--kt-text-muted); 
            font-size: 1.05rem;
            font-weight: 500;
            margin: 0 0 2.5rem 0; 
            line-height: 1.5;
        }

        .btn-menu { 
            display: flex; 
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%; 
            padding: 1.1rem 1.5rem; 
            margin-bottom: 1rem; 
            border-radius: var(--kt-btn-radius); 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 1.1rem; 
            transition: all 0.3s ease; 
            box-sizing: border-box; 
        }

        /* ปุ่มรับสมัคร (สีเขียวแบบ Metronic) */
        .btn-register { 
            background-color: var(--kt-success); 
            color: #ffffff; 
            box-shadow: 0 4px 14px 0 rgba(80, 205, 137, 0.2); /* เงาสีเขียวเรืองแสงอ่อนๆ */
        } 
        
        .btn-register:hover { 
            background-color: var(--kt-success-active); 
            transform: translateY(-2px); /* เอฟเฟกต์ยกตัวขึ้นนิดๆ */
            box-shadow: 0 6px 20px 0 rgba(80, 205, 137, 0.3);
        }

        /* ปุ่มตรวจสอบสถานะ (สีฟ้าแบบ Metronic) */
        .btn-status { 
            background-color: var(--kt-primary); 
            color: #ffffff; 
            box-shadow: 0 4px 14px 0 rgba(0, 158, 247, 0.2); /* เงาสีฟ้าเรืองแสงอ่อนๆ */
        } 
        
        .btn-status:hover { 
            background-color: var(--kt-primary-active); 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(0, 158, 247, 0.3);
        }

        .btn-icon {
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            🔭
        </div>
        <h1>Samsen Astro POSN</h1>
        <p>ระบบจัดการศูนย์สอบโอลิมปิกวิชาการ<br>สาขาดาราศาสตร์</p>
        
        <a href="register.html" class="btn-menu btn-register">
            <span class="btn-icon">📝</span> 1. รับสมัครสอบ
        </a>
        <a href="status.html" class="btn-menu btn-status">
            <span class="btn-icon">🔍</span> 2. ตรวจสอบสถานะ (ทั้งหมด)
        </a>
    </div>
</body>
</html>
